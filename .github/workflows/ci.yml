name: CI Pipeline

on:
  # Post-merge validation: a PR can be green on its own and still break master
  # when it lands alongside another (semantic conflict). Running the full suite
  # on push catches that before the nightly scheduled run would.
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default — each job grants only what it needs
permissions: {}

# Skip Homebrew's auto-update before every `brew install`. Auto-update
# re-evaluates all installed formulae, and any still using the deprecated
# `no_autobump! :requires_manual_review` API emit a warning that GitHub
# Actions promotes to an annotation — flooding each run with dozens of
# identical deprecation warnings. Disabling it removes that phase (and
# speeds installs); the pinned CLI tools are already on the runner image.
env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  code-quality:
    name: Code Quality
    runs-on: macos-26
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Select Xcode 26.5
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode_26.5*.app 2>/dev/null | head -1)
        if [ -z "$XCODE_PATH" ]; then
          echo "::error::Xcode 26.5 not found on runner"
          ls -d /Applications/Xcode_26*.app || true
          exit 1
        fi
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
        xcodebuild -version

    # Cache Homebrew's download cache only. The old /usr/local/Homebrew entry
    # was a no-op on the arm64 macos runners (brew lives in /opt/homebrew) and
    # caching the whole prefix would be huge — key bumped to v2 so stale
    # archives with the dead path aren't restored.
    # Note: Static version key (brew-v2) - increment manually when brew dependencies change
    - name: Cache Homebrew packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-brew-v2

    # Cache Mint packages
    # Note: Static version key (mint-v1) - increment manually when mint dependencies change
    - name: Cache Mint packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.mint
        key: ${{ runner.os }}-mint-v1
        restore-keys: |
          ${{ runner.os }}-mint-

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode project
      run: |
        make generate

    - name: Install Mint
      run: |
        brew install mint

    - name: Install SwiftFormat via Mint
      run: |
        mint install nicklockwood/SwiftFormat

    - name: Install SwiftLint
      run: |
        brew install swiftlint

    # Lint scope includes the two shipped app extensions (PulseShareExtension,
    # PulseWidgetExtension) — they ship to users and are inside the patch-coverage
    # gate, so they should hold the same style bar as the main app. (Test targets
    # are intentionally left out: they carry accepted style-warning noise.)
    - name: Validate SwiftFormat
      run: |
        echo "Running SwiftFormat validation..."
        if mint run swiftformat Pulse PulseTests PulseShareExtension PulseWidgetExtension --lint; then
          echo "SwiftFormat validation passed"
        else
          echo "SwiftFormat validation failed!"
          echo "Please run 'mint run swiftformat Pulse PulseTests PulseShareExtension PulseWidgetExtension' locally to fix formatting issues."
          exit 1
        fi

    - name: Run SwiftLint
      run: |
        echo "Running SwiftLint..."
        if swiftlint lint Pulse PulseTests PulseShareExtension PulseWidgetExtension --reporter github-actions-logging; then
          echo "SwiftLint validation passed"
        else
          echo "SwiftLint found issues!"
          echo "Please run 'swiftlint' locally to see detailed issues."
          exit 1
        fi

    # A dropped/renamed key doesn't fail the build — it silently ships the raw
    # key string (e.g. "common.ok") to users in that language. This gates on
    # en/pt/es having identical key sets per target, and on no duplicate keys.
    - name: Check localization key parity
      run: |
        echo "Checking Localizable.strings key parity across en/pt/es..."
        python3 scripts/check-localization-parity.py .

  # Decide whether this PR's diff touches any UI-impacting paths so we can
  # skip the expensive (180min) UI Tests matrix on non-UI PRs.  The analysis
  # only needs the list of changed files — no build, no Xcode.

  ui-impact:
    name: Check UI Impact
    # Pure git diff + Python — no Xcode or Apple SDK. Runs on ubuntu to save
    # macOS runner minutes (same rationale as `test-results` below).
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      contents: read

    outputs:
      run_ui_tests: ${{ steps.check.outputs.run_ui_tests }}

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Check if UI tests are needed
      id: check
      env:
        GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        echo "PR #${{ github.event.pull_request.number }} — base ${{ github.event.pull_request.base.sha }} → head ${{ github.event.pull_request.head.sha }}"

        if [ -z "$GITHUB_BASE_SHA" ] || [ -z "$GITHUB_HEAD_SHA" ]; then
          # Push to master (not a PR) — always run UI tests.
          echo "Not a PR event; running UI tests."
          echo "run_ui_tests=true" >> "$GITHUB_OUTPUT"
        else
          python3 .github/scripts/check-ui-impact.py \
            --base-sha "$GITHUB_BASE_SHA" \
            --head-sha "$GITHUB_HEAD_SHA"
        fi

  # Shared audit body lives in reusable-security-audit.yml (also called by the
  # nightly with tool-channel: latest). Pinned tools here for reproducible PR
  # gating. The required check context is "Security Audit / Checks".
  security-audit:
    name: Security Audit
    uses: ./.github/workflows/reusable-security-audit.yml
    permissions:
      contents: read
    with:
      tool-channel: pinned
      run-dependency-review: true

  build:
    name: Build Project
    runs-on: macos-26
    needs: code-quality
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "true"

    - name: Debug Package Dependencies
      run: |
        echo "Checking package dependencies..."
        if [ -d "Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/" ]; then
          ls -la Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/
          echo "Package.resolved content:"
          cat Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved || echo "Package.resolved not found"
        else
          echo "Swift PM directory not found (this is normal for a fresh project generation)"
        fi

    - name: Resolve Package Dependencies
      run: |
        echo "Explicitly resolving Swift Package Manager dependencies..."
        xcodebuild -resolvePackageDependencies \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -onlyUsePackageVersionsFromResolvedFile
        echo "Package dependencies resolved successfully"

    - name: Build for testing (PulseDev)
      run: |
        echo "Building PulseDev scheme for testing..."
        xcodebuild build-for-testing \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -derivedDataPath ./DerivedData \
          -enableCodeCoverage YES \
          -skipMacroValidation \
          ENABLE_ONLY_ACTIVE_RESOURCES=NO

    - name: Build for testing (PulseSnapshotTests)
      run: |
        echo "Building PulseSnapshotTests scheme for testing..."
        xcodebuild build-for-testing \
          -project Pulse.xcodeproj \
          -scheme PulseSnapshotTests \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -derivedDataPath ./DerivedData \
          -enableCodeCoverage YES \
          -skipMacroValidation \
          ENABLE_ONLY_ACTIVE_RESOURCES=NO

    # Only Build/Products is uploaded — that's all test-without-building needs
    # (the .xctestrun files and app/test bundles live there). The rest of
    # DerivedData (Intermediates.noindex, ModuleCache, SourcePackages) is the
    # bulk of the directory and dead weight for the four downstream downloads.
    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-products
        path: ./DerivedData/Build/Products
        retention-days: 1

  # The matrix above compiles Debug. Release exercises a genuinely different
  # path: whole-module optimization (vs -Onone singlefile), dead-code stripping,
  # and — specific to Pulse — the `#if DEBUG` API-key env-var fallback compiled
  # out. We build for the *simulator* on purpose: a device (iphoneos) Release
  # build trips the "Upload dSYMs to Crashlytics" phase, which requires the
  # production GoogleService-Info.plist (a secret, not in the repo). The simulator
  # skips that phase (PLATFORM_NAME != iphoneos), so this stays credential-free
  # while still catching Release-only compile breaks. Mirrors `make build-release`.
  release-build:
    name: Release Build
    runs-on: macos-26
    needs: code-quality
    timeout-minutes: 45

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "true"

    - name: Resolve Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project Pulse.xcodeproj \
          -scheme PulseProd \
          -onlyUsePackageVersionsFromResolvedFile

    # Simulator destination so the device-only "Upload dSYMs to Crashlytics" guard
    # phase is skipped (no GoogleService-Info.plist needed). CODE_SIGNING_ALLOWED=NO
    # keeps it credential-free — this validates the Release compile, not signing.
    - name: Build PulseProd (Release, simulator)
      run: |
        xcodebuild build \
          -project Pulse.xcodeproj \
          -scheme PulseProd \
          -configuration Release \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -onlyUsePackageVersionsFromResolvedFile \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO

  # Split into three independent jobs (rather than one Unit/UI/UI-iPad/Snapshot
  # matrix) so patch-coverage — which only consumes the unit + snapshot xcresults —
  # can start as soon as those two finish, instead of waiting on the much longer
  # (180min) and flakier UI Tests legs, and so a UI Tests failure doesn't skip
  # patch-coverage entirely (job-level `needs` treats a matrix job as one unit:
  # any failing leg fails the whole thing).
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: build
    timeout-minutes: 75

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "true"

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-products
        path: ./DerivedData/Build/Products

    - name: Run Unit Tests
      timeout-minutes: 60
      env:
        SCHEME: PulseDev
        TEST_TARGET: PulseTests
        ARTIFACT_NAME: unit-test-results
        TEST_NAME: Unit Tests
      run: |
        mkdir -p test-results
        set -o pipefail

        DEST="platform=iOS Simulator,name=iPhone Air,OS=latest"
        echo "Test destination: $DEST"

        xcodebuild test-without-building \
          -project Pulse.xcodeproj \
          -scheme "$SCHEME" \
          -only-testing:"$TEST_TARGET" \
          -destination "$DEST" \
          -derivedDataPath ./DerivedData \
          -resultBundlePath "test-results/${ARTIFACT_NAME}.xcresult" \
          -enableCodeCoverage YES \
          -disableAutomaticPackageResolution \
          -retry-tests-on-failure \
          2>&1 | tee /tmp/test_output.log

        TEST_EXIT_CODE=${PIPESTATUS[0]}

        echo ""
        echo "============================================"
        echo "              TEST SUMMARY"
        echo "============================================"
        grep -E "(Test Suite.*started|Test Suite.*passed|Test Suite.*failed|Executed [0-9]+ test)" /tmp/test_output.log | tail -10 || echo "$TEST_NAME completed"

        exit $TEST_EXIT_CODE

    - name: Extract and display test failures
      if: failure()
      run: python3 scripts/extract-test-failures.py
      env:
        RESULT_BUNDLE: test-results/unit-test-results.xcresult
        TEST_NAME: Unit Tests

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: unit-test-results
        path: test-results/unit-test-results.xcresult
        if-no-files-found: warn

  snapshot-tests:
    name: Snapshot Tests
    runs-on: macos-26
    needs: build
    timeout-minutes: 75

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "true"

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-products
        path: ./DerivedData/Build/Products

    - name: Run Snapshot Tests
      timeout-minutes: 60
      env:
        SCHEME: PulseSnapshotTests
        TEST_TARGET: PulseSnapshotTests
        ARTIFACT_NAME: snapshot-test-results
        TEST_NAME: Snapshot Tests
      run: |
        mkdir -p test-results
        set -o pipefail

        DEST="platform=iOS Simulator,name=iPhone Air,OS=latest"
        echo "Test destination: $DEST"

        xcodebuild test-without-building \
          -project Pulse.xcodeproj \
          -scheme "$SCHEME" \
          -only-testing:"$TEST_TARGET" \
          -destination "$DEST" \
          -derivedDataPath ./DerivedData \
          -resultBundlePath "test-results/${ARTIFACT_NAME}.xcresult" \
          -enableCodeCoverage YES \
          -disableAutomaticPackageResolution \
          -retry-tests-on-failure \
          2>&1 | tee /tmp/test_output.log

        TEST_EXIT_CODE=${PIPESTATUS[0]}

        echo ""
        echo "============================================"
        echo "              TEST SUMMARY"
        echo "============================================"
        grep -E "(Test Suite.*started|Test Suite.*passed|Test Suite.*failed|Executed [0-9]+ test)" /tmp/test_output.log | tail -10 || echo "$TEST_NAME completed"

        exit $TEST_EXIT_CODE

    - name: Extract and display test failures
      if: failure()
      run: python3 scripts/extract-test-failures.py
      env:
        RESULT_BUNDLE: test-results/snapshot-test-results.xcresult
        TEST_NAME: Snapshot Tests

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: snapshot-test-results
        path: test-results/snapshot-test-results.xcresult
        if-no-files-found: warn

    - name: Upload recorded snapshots
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: recorded-snapshots
        path: PulseSnapshotTests/**/__Snapshots__/**/*.png
        if-no-files-found: ignore

  ui-tests:
    name: ${{ matrix.test-name }}
    # Only run when the impact analysis says UI-affecting files changed.
    if: ${{ needs.ui-impact.outputs.run_ui_tests == 'true' }}
    runs-on: macos-26
    needs: [build, ui-impact]
    # Ceiling above the per-leg step timeout (180) plus setup. The real
    # per-run bound is the matrix `timeout` step-level value below; this is
    # just runaway insurance for the setup/download steps.
    timeout-minutes: 210

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - test-target: PulseUITests
            test-name: UI Tests
            scheme: PulseDev
            artifact-name: ui-test-results
            timeout: 180
          # iPad = regular size class, where the adaptive paths live
          # (NavigationSplitView, LazyVGrid vs LazyVStack, the 720pt detail cap).
          # The iPhone matrix entry only ever exercises compact width. Reuses
          # the same simulator build products (test-without-building).
          - test-target: PulseUITests
            test-name: UI Tests (iPad)
            scheme: PulseDev
            artifact-name: ui-test-results-ipad
            timeout: 180
            ipad: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "true"

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-products
        path: ./DerivedData/Build/Products

    - name: Run ${{ matrix.test-name }}
      timeout-minutes: ${{ matrix.timeout }}
      env:
        SCHEME: ${{ matrix.scheme }}
        TEST_TARGET: ${{ matrix.test-target }}
        ARTIFACT_NAME: ${{ matrix.artifact-name }}
        TEST_NAME: ${{ matrix.test-name }}
        IPAD: ${{ matrix.ipad }}
      run: |
        mkdir -p test-results
        set -o pipefail

        # Resolve the simulator. iPad entries (matrix.ipad) run on a
        # dynamically-discovered iPad so the destination survives runner-image
        # changes; everything else targets iPhone Air, matching the build job.
        if [ -n "$IPAD" ]; then
          DEVICE=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.isAvailable and (.name | startswith("iPad"))) | .name]
                     | (map(select(test("Pro"))) + .)[0] // empty')
          [ -z "$DEVICE" ] && DEVICE="iPad Pro 13-inch (M4)"
        else
          DEVICE="iPhone Air"
        fi
        DEST="platform=iOS Simulator,name=$DEVICE,OS=latest"
        echo "Test destination: $DEST"

        # No -enableCodeCoverage here: patch-coverage only consumes the unit +
        # snapshot xcresults, so collecting coverage on the slowest legs was
        # pure overhead.
        xcodebuild test-without-building \
          -project Pulse.xcodeproj \
          -scheme "$SCHEME" \
          -only-testing:"$TEST_TARGET" \
          -destination "$DEST" \
          -derivedDataPath ./DerivedData \
          -resultBundlePath "test-results/${ARTIFACT_NAME}.xcresult" \
          -disableAutomaticPackageResolution \
          -retry-tests-on-failure \
          2>&1 | tee /tmp/test_output.log

        TEST_EXIT_CODE=${PIPESTATUS[0]}

        echo ""
        echo "============================================"
        echo "              TEST SUMMARY"
        echo "============================================"
        grep -E "(Test Suite.*started|Test Suite.*passed|Test Suite.*failed|Executed [0-9]+ test)" /tmp/test_output.log | tail -10 || echo "$TEST_NAME completed"

        exit $TEST_EXIT_CODE

    - name: Extract and display test failures
      if: failure()
      run: python3 scripts/extract-test-failures.py
      env:
        RESULT_BUNDLE: test-results/${{ matrix.artifact-name }}.xcresult
        TEST_NAME: ${{ matrix.test-name }}

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: ${{ matrix.artifact-name }}
        path: test-results/${{ matrix.artifact-name }}.xcresult
        if-no-files-found: warn

  patch-coverage:
    name: Patch Coverage
    runs-on: macos-26
    needs: [unit-tests, snapshot-tests]
    if: github.event_name == 'pull_request'
    timeout-minutes: 15

    permissions:
      contents: read
      pull-requests: write

    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      THRESHOLD: '75'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        # The base-ref fetch below works unauthenticated (public repo), so no
        # credential needs to persist in .git/config.
        persist-credentials: false

    - name: Ensure base ref is present
      run: git fetch --no-tags --depth=200 origin "$BASE_SHA" || true

    - name: Select Xcode 26.5
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode_26.5*.app 2>/dev/null | head -1)
        if [ -z "$XCODE_PATH" ]; then
          echo "::error::Xcode 26.5 not found on runner"
          ls -d /Applications/Xcode_26*.app || true
          exit 1
        fi
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
        xcodebuild -version

    - name: Download unit test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: unit-test-results
        path: artifacts/unit

    - name: Download snapshot test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: snapshot-test-results
        path: artifacts/snap

    - name: Install diff-cover
      run: |
        pipx install diff-cover
        pipx ensurepath || true

    # actions/upload-artifact uploads a directory's *contents* (not the directory
    # itself), so the downloaded artifacts land directly inside artifacts/unit
    # and artifacts/snap — those paths are the xcresult bundles.
    - name: Convert xcresult bundles to Cobertura
      run: |
        python3 scripts/xcresult-to-cobertura.py artifacts/unit \
          --project-root "$PWD" -o unit-coverage.xml
        python3 scripts/xcresult-to-cobertura.py artifacts/snap \
          --project-root "$PWD" -o snap-coverage.xml

    # diff-cover's --include/--exclude use argparse nargs='+' and internally
    # resolve patterns via glob.glob(recursive=True), NOT fnmatch. Two
    # consequences:
    #   1. Repeating `--include` only keeps the last value — all patterns must
    #      follow a single --include flag.
    #   2. `**/` is required to recurse; `Pulse/*.swift` only matches files
    #      directly inside `Pulse/`, so nested files (Pulse/Home/Foo.swift)
    #      get silently dropped without `**`.
    # The `|| RESULT=$?` dance ensures the markdown report always lands in the
    # job summary, not just on the happy path — `bash -e` would otherwise skip
    # it when diff-cover exits non-zero on a threshold failure.
    # LiveAuthService is excluded because it is direct glue over the Firebase
    # Auth, GoogleSignIn, and ASAuthorizationController singletons — none of
    # which expose protocol seams for unit-test mocking, and instantiating
    # `LiveAuthService` without `FirebaseApp.configure()` (not invoked by the
    # test bundle) fatal-errors. PulseTests/Configs/LiveServicesBasicTests.swift
    # documents the same constraint with `#expect(true)` placeholders.
    # Auth business logic is exercised at the domain layer through the
    # AuthService protocol + MockAuthService.
    #
    # LiveAuthService+Anonymous is split from LiveAuthService to keep the
    # parent file under SwiftLint's file-length budget; it wraps
    # `Auth.auth().signInAnonymously()` and carries the same un-mockable
    # Firebase Auth dependency. Same justification as LiveAuthService.
    # Reviewer flow is exercised at the domain layer through
    # AuthDomainInteractorTests and SignInViewModelTests.
    #
    # FirebaseUser+AuthUser is the same kind of glue — an extension on the
    # non-mockable `FirebaseAuth.User` reference type — and was extracted
    # from LiveAuthService purely to keep that file under SwiftLint's
    # file-length budget. Same justification as LiveAuthService applies.
    #
    # SignOutCleanup is direct glue over the Security framework's `SecItem*`
    # C API and the `CKContainer` singleton; neither exposes a protocol seam
    # without inverting the helper into a parameterised abstraction. Happy
    # paths are exercised end-to-end through SettingsViewModelSignOutTests
    # (62% line coverage today). The remaining lines are the warning-log
    # branch on `SecItemDelete` returning a non-success/non-not-found OSStatus
    # and the success-log branch inside a `Task.detached` doing real CloudKit
    # zone deletion — both require simulating external-SDK failure modes.
    #
    # ShareViewController is the principal class for the Share Extension —
    # a UIViewController subclass tied to `extensionContext` (read-only at
    # runtime) and the `NSItemProvider` callback. The URL-validation logic
    # it dispatches into is unit-tested through SharedURLQueueTests, so the
    # only uncovered code is the UIKit lifecycle around it.
    #
    # LLMModelManager + LiveLLMService are direct glue over the vendored
    # SwiftLlama / llama.cpp + Metal stack. The 600 MB model is never loaded in
    # CI, so the generation / inference paths cannot execute under test. The
    # LLMService protocol is exercised at the domain layer through mocks
    # (SummarizationDomainInteractorTests, FeedDomainInteractorTests). Same
    # un-mockable-singleton justification as LiveAuthService.
    #
    # LiveTextToSpeechService is glue over AVSpeechSynthesizer + AVAudioSession +
    # MPRemoteCommandCenter / MPNowPlayingInfoCenter — system singletons with no
    # protocol seam. Driven through the TextToSpeechService protocol +
    # MockTextToSpeechService at the domain layer (ArticleDetailTTSInteractorTests).
    #
    # TTSLiveActivityController wraps ActivityKit, which requires a running app
    # context (no Activity can be requested / updated in the unit-test host) and
    # is a `.shared` singleton with no seam.
    #
    # The WidgetKit declarative UI — TTSLiveActivity (the Live Activity lock-screen
    # / Dynamic Island views), PulseNewsWidget (the home-screen widget view), and
    # PulseWidgetBundle (the @main WidgetBundle entry point) — only renders inside a
    # widget / Activity host, so there is no unit-test seam (same category as
    # TTSLiveActivityController above and the PulseSceneDelegate composition root
    # below). The testable widget code — NewsTimelineProvider, SharedArticle,
    # SharedDataManager — stays in the coverage net.
    #
    # LiveStoreKitService is glue over StoreKit 2's Transaction.currentEntitlements
    # / Transaction.updates async sequences; exercising them needs an SKTestSession
    # harness not present in the suite (tracked as a follow-up). StoreKitService is
    # mocked at the domain layer (MockStoreKitService, PaywallDomainInteractorTests).
    #
    # PulseSceneDelegate is the composition root — UIWindowSceneDelegate lifecycle
    # plus service registration; not unit-testable, same category as
    # ShareViewController.
    #
    # SettingsView / ArticleDetailView / FeedView host the StoreKit-2 premium
    # re-verification as SwiftUI lifecycle glue (`.task`/`.onAppear` calling
    # `refreshSubscriptionStatus()` + a cache-seed), which has no protocol seam
    # for plain xctest. The re-verify contract is covered at the service layer
    # (StoreKitService protocol + Mock/Live tests); the views are the same
    # untestable-lifecycle category as the entries above.
    #
    # VideoPlayerView is a UIViewRepresentable wrapping WKWebView — its updateUIView
    # lifecycle has no protocol seam for plain xctest. Its one security-relevant
    # decision (the HTTPS-only inline-load gate, isSafeInlineVideoURL) IS unit-tested
    # in VideoPlayerViewTests; only the UIKit glue is excluded.
    - name: Enforce patch coverage threshold
      run: |
        RESULT=0
        diff-cover unit-coverage.xml snap-coverage.xml \
          --compare-branch "$BASE_SHA" \
          --fail-under "$THRESHOLD" \
          --include 'Pulse/**/*.swift' 'PulseShareExtension/**/*.swift' 'PulseWidgetExtension/**/*.swift' \
           --exclude '**/*+Preview.swift' '**/Preview Content/**' \
                     '**/LiveAuthService.swift' '**/LiveAuthService+Anonymous.swift' \
                     '**/FirebaseUser+AuthUser.swift' \
                     '**/SignOutCleanup.swift' '**/ShareViewController.swift' \
                     '**/LiveAnalyticsService.swift' '**/ShareRootView.swift' \
                     '**/NewsTimelineProvider.swift' '**/SearchPulseIntent.swift' \
                     '**/SharedDataManager.swift' '**/LLMModelManager.swift' '**/LiveLLMService.swift' \
                     '**/LiveTextToSpeechService.swift' \
                     '**/TTSLiveActivityController.swift' \
                    '**/TTSLiveActivity.swift' '**/PulseNewsWidget.swift' \
                    '**/PulseWidgetBundle.swift' \
                    '**/LiveStoreKitService.swift' \
                    '**/PulseSceneDelegate.swift' \
                    '**/SettingsView.swift' '**/ArticleDetailView.swift' '**/FeedView.swift' \
                    '**/VideoPlayerView.swift' \
          --markdown-report patch-coverage.md || RESULT=$?
        {
          echo "## Patch Coverage Report"
          echo ""
          cat patch-coverage.md
        } >> "$GITHUB_STEP_SUMMARY"
        exit $RESULT

    # Post the same diff-cover markdown as a sticky PR comment, updated in place
    # on each push (header acts as the marker). `if: always()` is load-bearing —
    # the threshold step exits non-zero when coverage drops below the floor,
    # which is exactly when you most want the report visible on the PR.
    - name: Post patch coverage as PR comment
      if: always() && hashFiles('patch-coverage.md') != ''
      uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
      with:
        header: patch-coverage
        path: patch-coverage.md

    - name: Upload patch coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: patch-coverage-report
        path: patch-coverage.md
        if-no-files-found: warn

  test-results:
    name: Test Results Summary
    # Pure bookkeeping (download artifacts + shell) — no Xcode/xcrun, so it runs
    # on ubuntu (10x cheaper than a macOS runner).
    # When ui-impact says no UI changes, the ui-tests job is skipped (not
    # failed), so we must treat "skipped" as success below.
    runs-on: ubuntu-latest
    needs: [unit-tests, snapshot-tests, ui-tests]
    if: always()
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Download unit test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: unit-test-results
        path: unit-test-results

    - name: Download UI test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: ui-test-results
        path: ui-test-results

    - name: Download snapshot test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: snapshot-test-results
        path: snapshot-test-results

    - name: Check test job results
      id: check-results
      run: |
        # Treat "skipped" the same as "success" — UI tests are intentionally
        # skipped when no UI-impacting files changed (ui-impact gate).
        UNIT_RESULT="${{ needs.unit-tests.result }}"
        SNAPSHOT_RESULT="${{ needs.snapshot-tests.result }}"
        UI_RESULT="${{ needs.ui-tests.result }}"
        echo "Unit Tests job result: $UNIT_RESULT"
        echo "Snapshot Tests job result: $SNAPSHOT_RESULT"
        echo "UI Tests job result: $UI_RESULT"

        ui_ok=true
        if [ "$UNIT_RESULT" != "success" ]; then ui_ok=false; fi
        if [ "$SNAPSHOT_RESULT" != "success" ]; then ui_ok=false; fi
        # UI tests: success OR skipped (skipped = no UI changes)
        if [ "$UI_RESULT" != "success" ] && [ "$UI_RESULT" != "skipped" ]; then ui_ok=false; fi

        if $ui_ok; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi

    - name: Display Test Results Summary
      env:
        UI_RESULT: ${{ needs.ui-tests.result }}
      run: |
        echo "Test Results Summary"
        echo "===================="
        echo ""

        # Check if artifacts exist and display status
        UNIT_STATUS="Unknown"
        UI_STATUS="Unknown"
        SNAPSHOT_STATUS="Unknown"

        if [ -d "unit-test-results" ]; then
          UNIT_STATUS="Completed"
        else
          UNIT_STATUS="Failed or Missing"
        fi

        # UI tests may be skipped (no UI changes per ui-impact gate).
        if [ "$UI_RESULT" == "skipped" ]; then
          UI_STATUS="Skipped (no UI changes)"
        elif [ -d "ui-test-results" ]; then
          UI_STATUS="Completed"
        else
          UI_STATUS="Failed or Missing"
        fi

        if [ -d "snapshot-test-results" ]; then
          SNAPSHOT_STATUS="Completed"
        else
          SNAPSHOT_STATUS="Failed or Missing"
        fi

        echo "Unit Tests: $UNIT_STATUS"
        echo "UI Tests: $UI_STATUS"
        echo "Snapshot Tests: $SNAPSHOT_STATUS"
        echo ""
        echo "Test artifacts downloaded:"
        ls -la unit-test-results/ 2>/dev/null || echo "  No unit test artifacts found"
        ls -la ui-test-results/ 2>/dev/null || echo "  No UI test artifacts found"
        ls -la snapshot-test-results/ 2>/dev/null || echo "  No snapshot test artifacts found"
        echo ""

        if [ "${{ steps.check-results.outputs.status }}" == "success" ]; then
          echo "All tests completed successfully!"
        else
          echo "Some tests failed or were cancelled"
        fi

    - name: Fail if tests failed
      if: steps.check-results.outputs.status == 'failure'
      run: |
        echo "::error::Test suite failed or was cancelled"
        exit 1

  coverage-summary:
    name: Coverage Summary
    runs-on: macos-26
    needs: unit-tests
    if: always()
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Select Xcode 26.5
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode_26.5*.app 2>/dev/null | head -1)
        if [ -z "$XCODE_PATH" ]; then
          echo "::error::Xcode 26.5 not found on runner"
          ls -d /Applications/Xcode_26*.app || true
          exit 1
        fi
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"

    - name: Download unit test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: unit-test-results
        path: coverage-xcresult

    # Overall app-target line coverage — complements the Patch Coverage gate,
    # which only measures *changed* lines. This is reported, not gated, so a
    # PR that lowers overall coverage is visible without blocking on it.
    - name: Report overall coverage
      run: |
        BUNDLE=$(find coverage-xcresult -maxdepth 2 -name '*.xcresult' -type d 2>/dev/null | head -1)
        if [ -z "$BUNDLE" ]; then
          echo "::warning::No xcresult found — skipping coverage summary"
          {
            echo "## Coverage Summary"
            echo ""
            echo "_No unit-test result bundle available._"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        echo "Reading coverage from $BUNDLE"
        COVERAGE=$(xcrun xccov view --report "$BUNDLE" 2>/dev/null \
          | grep "Pulse.app" | head -1 | awk '{print $NF}' | tr -d '%')
        [ -z "$COVERAGE" ] && COVERAGE="0"
        echo "App-target coverage: ${COVERAGE}%"
        bash scripts/generate-coverage-badge.sh "$BUNDLE" || true
        {
          echo "## Coverage Summary"
          echo ""
          echo "| Target | Line coverage |"
          echo "|--------|---------------|"
          echo "| Pulse.app | ${COVERAGE}% |"
          echo ""
          echo "_Overall app-target coverage. Per-PR changed-line coverage is gated"
          echo "separately by the Patch Coverage job (75% floor)._"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage badge
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: coverage-badge
        path: badges/coverage.svg
        if-no-files-found: ignore
