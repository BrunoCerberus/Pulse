name: PR Title

# Enforces Conventional Commit PR titles (matching the ci:/deps:/fix:/… prefixes
# already used on master). Squash-merge uses the PR title as the commit subject,
# so this keeps history — and any future changelog generation — consistent.

on:
  pull_request:
    # No `synchronize`: pushing commits never changes the title, so it would
    # only add redundant runs. opened/edited/reopened/ready_for_review cover
    # every event that can actually change the title.
    types: [opened, edited, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Validate PR title
      env:
        # Passed via env, never interpolated as ${{ }} into the script body:
        # PR titles are attacker-controlled, and inlining would be a
        # shell-injection hole.
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        echo "PR title: $PR_TITLE"
        pattern='^(build|chore|ci|deps|docs|feat|fix|perf|refactor|revert|style|test)(\([a-zA-Z0-9 ,_/.-]+\))?!?: .+'
        if echo "$PR_TITLE" | grep -Eq "$pattern"; then
          echo "Title follows Conventional Commits."
        else
          echo "::error::PR title must follow Conventional Commits, e.g. 'fix: correct cache TTL' or 'feat(search): add filters'."
          echo "Allowed types: build, chore, ci, deps, docs, feat, fix, perf, refactor, revert, style, test."
          exit 1
        fi
