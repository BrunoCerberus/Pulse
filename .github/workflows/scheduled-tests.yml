name: Scheduled Tests

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual triggering

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default — each job grants only what it needs
permissions: {}

jobs:
  build:
    name: Build Project
    runs-on: macos-26

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: '26.4'

    - name: Install iOS Simulator Runtime
      run: |
        echo "Installing iOS simulator runtime..."
        # Initialize CoreSimulator service before downloading
        xcrun simctl list runtimes > /dev/null 2>&1 || true
        sleep 5
        xcodebuild -downloadPlatform iOS
        echo "Available iOS simulator runtimes:"
        xcrun simctl list runtimes | grep iOS

    # Cache Homebrew packages
    # Note: Static version key (brew-v1) - increment manually when brew dependencies change
    - name: Cache Homebrew packages
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: ${{ runner.os }}-brew-v1
        restore-keys: |
          ${{ runner.os }}-brew-

    # Cache SPM dependencies (metadata + downloaded artifacts including binary XCFrameworks)
    # Note: Using static version key due to hashFiles() limitations in this CI environment
    # Manually increment version when project.yml package dependencies change
    # IMPORTANT: Do NOT use broad restore-keys fallback - it can restore stale package versions
    # v6: Added ~/Library/Caches/org.swift.swiftpm to cache binary artifacts
    - name: Cache SPM dependencies
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          ~/Library/Caches/org.swift.swiftpm
        key: ${{ runner.os }}-spm-v9

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode project
      run: |
        make generate

    - name: Debug Package Dependencies
      run: |
        echo "Checking package dependencies..."
        if [ -d "Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/" ]; then
          ls -la Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/
          echo "Package.resolved content:"
          cat Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved || echo "Package.resolved not found"
        else
          echo "Swift PM directory not found (this is normal for a fresh project generation)"
        fi

    - name: Resolve Package Dependencies
      run: |
        echo "Explicitly resolving Swift Package Manager dependencies..."
        xcodebuild -resolvePackageDependencies \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -onlyUsePackageVersionsFromResolvedFile
        echo "Package dependencies resolved successfully"

    - name: Build for testing (PulseDev)
      run: |
        echo "Building PulseDev scheme for testing..."
        xcodebuild build-for-testing \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -derivedDataPath ./DerivedData \
          -skipMacroValidation

    - name: Build for testing (PulseSnapshotTests)
      run: |
        echo "Building PulseSnapshotTests scheme for testing..."
        xcodebuild build-for-testing \
          -project Pulse.xcodeproj \
          -scheme PulseSnapshotTests \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -derivedDataPath ./DerivedData \
          -skipMacroValidation

    - name: Upload build artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: scheduled-build-products
        path: ./DerivedData
        retention-days: 1

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - name: Harden runner
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    # Gitleaks: 150+ secret patterns vs our previous 3-pattern grep scan
    - name: Install Gitleaks
      run: |
        GITLEAKS_VERSION="8.22.1"
        curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
        sudo mv gitleaks /usr/local/bin/

    - name: Run Gitleaks secret scanning
      id: gitleaks
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  Gitleaks Secret Scanning (150+ patterns)"
        echo "============================================"
        echo ""
        gitleaks detect --source . --redact --verbose --no-banner --config .gitleaks.toml

    # mobsfscan: iOS/Swift-specific SAST (OWASP MASTG patterns)
    - name: Install mobsfscan
      run: pip install 'mobsfscan>=0.3,<1.0'

    - name: Run mobsfscan iOS security analysis
      id: mobsfscan
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  MobSF Static Analysis (iOS/Swift SAST)"
        echo "============================================"
        echo ""
        mobsfscan Pulse/

    - name: Verify HTTPS-only network calls
      id: https-check
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  HTTPS Enforcement Check"
        echo "============================================"
        echo ""

        INSECURE=$(grep -rn --include="*.swift" 'http://' Pulse/ 2>/dev/null \
          | grep -v 'localhost' \
          | grep -v '127\.0\.0\.1' \
          | grep -v '// .*http://' \
          | grep -v 'NSAppTransportSecurity' \
          | grep -v '"http"' \
          || true)

        if [ -n "$INSECURE" ]; then
          echo "::error::Insecure HTTP URLs found:"
          echo "$INSECURE"
          exit 1
        fi
        echo "All URLs use HTTPS"

    - name: Validate privacy manifest
      id: privacy-manifest
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  Privacy Manifest Validation"
        echo "============================================"
        echo ""

        if [ ! -f "Pulse/PrivacyInfo.xcprivacy" ]; then
          echo "::error::PrivacyInfo.xcprivacy not found"
          exit 1
        fi

        # xmllint may not be available on ubuntu-latest — fall back to Python
        if command -v xmllint &>/dev/null; then
          xmllint --noout Pulse/PrivacyInfo.xcprivacy || { echo "::error::Privacy manifest has invalid XML"; exit 1; }
        else
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('Pulse/PrivacyInfo.xcprivacy')" || { echo "::error::Privacy manifest has invalid XML"; exit 1; }
        fi
        echo "Valid XML structure"

        for KEY in NSPrivacyAccessedAPITypes NSPrivacyCollectedDataTypes NSPrivacyTracking; do
          if grep -q "$KEY" Pulse/PrivacyInfo.xcprivacy; then
            echo "$KEY: declared"
          else
            echo "::warning::$KEY not found in privacy manifest"
          fi
        done

        # Verify API type entries have reason codes
        API_TYPES=$(grep -c "<key>NSPrivacyAccessedAPIType</key>" Pulse/PrivacyInfo.xcprivacy || echo "0")
        REASONS=$(grep -c "NSPrivacyAccessedAPITypeReasons" Pulse/PrivacyInfo.xcprivacy || echo "0")
        echo "API type declarations: $API_TYPES, Reason code declarations: $REASONS"
        if [ "$API_TYPES" -gt 0 ] && [ "$REASONS" -eq 0 ]; then
          echo "::error::API types declared without reason codes — will be rejected by App Store"
          exit 1
        fi

    - name: Check App Transport Security exceptions
      id: ats-check
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  ATS Exception Check"
        echo "============================================"
        echo ""

        FOUND=0
        for plist in $(find . -name "Info.plist" -not -path "*/DerivedData/*" -not -path "*/.build/*" 2>/dev/null); do
          if grep -q "NSAllowsArbitraryLoads" "$plist" 2>/dev/null; then
            echo "::error::NSAllowsArbitraryLoads found in $plist"
            FOUND=1
          fi
          if grep -q "NSAllowsArbitraryLoadsInWebContent" "$plist" 2>/dev/null; then
            echo "::warning::NSAllowsArbitraryLoadsInWebContent found in $plist"
          fi
          if grep -q "NSExceptionDomains" "$plist" 2>/dev/null; then
            echo "::warning::NSExceptionDomains found in $plist — verify domains are necessary:"
            grep -A 5 "NSExceptionDomains" "$plist"
          fi
        done

        if [ -f "project.yml" ] && grep -q "NSAllowsArbitraryLoads" project.yml 2>/dev/null; then
          echo "::error::NSAllowsArbitraryLoads declared in project.yml"
          FOUND=1
        fi

        [ $FOUND -eq 0 ] && echo "No ATS exceptions found"
        [ $FOUND -gt 0 ] && exit 1
        true

    - name: Audit entitlements
      id: entitlements
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  Entitlements Audit"
        echo "============================================"
        echo ""

        SENSITIVE_ENTITLEMENTS=(
          "com.apple.security.get-task-allow"
          "com.apple.security.cs.disable-library-validation"
          "com.apple.security.cs.allow-dyld-environment-variables"
          "com.apple.security.cs.allow-unsigned-executable-memory"
        )

        FOUND=0
        for ent_file in $(find . -name "*.entitlements" -not -path "*/DerivedData/*" 2>/dev/null); do
          echo "Checking $ent_file..."
          for ent in "${SENSITIVE_ENTITLEMENTS[@]}"; do
            if grep -q "$ent" "$ent_file" 2>/dev/null; then
              echo "::warning::Sensitive entitlement '$ent' found in $ent_file"
              FOUND=1
            fi
          done
        done

        [ $FOUND -eq 0 ] && echo "No sensitive entitlements found"
        [ $FOUND -gt 0 ] && exit 1
        true

    - name: Audit file permissions
      id: file-perms
      continue-on-error: true
      run: |
        echo "============================================"
        echo "  File Permission Audit"
        echo "============================================"
        echo ""

        ISSUES=0

        UNSAFE=$(find Pulse/ -type f -perm -o+w 2>/dev/null || true)
        if [ -n "$UNSAFE" ]; then
          echo "::warning::World-writable files found:"
          echo "$UNSAFE"
          ISSUES=$((ISSUES + 1))
        else
          echo "No world-writable files found"
        fi

        EXEC=$(find Pulse/ -name "*.swift" -type f -executable 2>/dev/null || true)
        if [ -n "$EXEC" ]; then
          echo "::warning::Executable Swift files found (unusual):"
          echo "$EXEC"
          ISSUES=$((ISSUES + 1))
        else
          echo "No executable Swift files"
        fi

        [ $ISSUES -gt 0 ] && exit 1
        true

    - name: Security audit summary
      if: always()
      env:
        GITLEAKS: ${{ steps.gitleaks.outcome }}
        MOBSFSCAN: ${{ steps.mobsfscan.outcome }}
        HTTPS_CHECK: ${{ steps.https-check.outcome }}
        PRIVACY: ${{ steps.privacy-manifest.outcome }}
        ATS: ${{ steps.ats-check.outcome }}
        ENTITLEMENTS: ${{ steps.entitlements.outcome }}
        FILE_PERMS: ${{ steps.file-perms.outcome }}
      run: |
        echo ""
        echo "============================================"
        echo "  Security Audit Summary"
        echo "============================================"

        echo "## Security Audit Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
        echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

        FAILURES=0
        for check in "Gitleaks:$GITLEAKS" "mobsfscan:$MOBSFSCAN" "HTTPS Enforcement:$HTTPS_CHECK" "Privacy Manifest:$PRIVACY" "ATS Exceptions:$ATS" "Entitlements:$ENTITLEMENTS" "File Permissions:$FILE_PERMS"; do
          name="${check%%:*}"
          result="${check##*:}"
          if [ "$result" = "failure" ]; then
            FAILURES=$((FAILURES + 1))
            echo "| $name | FAILED |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| $name | Passed |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "$name: $result"
        done

        if [ $FAILURES -gt 0 ]; then
          echo ""
          echo "::error::$FAILURES security check(s) failed — review findings above"
          exit 1
        fi

        echo ""
        echo "All security checks passed"

  tests:
    name: ${{ matrix.test-name }}
    runs-on: macos-26
    needs: build

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - test-target: PulseTests
            test-name: Unit Tests
            scheme: PulseDev
            artifact-name: scheduled-unit-test-results
            timeout: 60
          - test-target: PulseUITests
            test-name: UI Tests
            scheme: PulseDev
            artifact-name: scheduled-ui-test-results
            timeout: 180
          - test-target: PulseSnapshotTests
            test-name: Snapshot Tests
            scheme: PulseSnapshotTests
            artifact-name: scheduled-snapshot-test-results
            timeout: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: '26.4'

    - name: Install iOS Simulator Runtime
      run: |
        echo "Installing iOS simulator runtime..."
        # Initialize CoreSimulator service before downloading
        xcrun simctl list runtimes > /dev/null 2>&1 || true
        sleep 5
        xcodebuild -downloadPlatform iOS
        echo "Available iOS simulator runtimes:"
        xcrun simctl list runtimes | grep iOS

    # Cache Homebrew packages
    # Note: Static version key (brew-v1) - increment manually when brew dependencies change
    - name: Cache Homebrew packages
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: ${{ runner.os }}-brew-v1
        restore-keys: |
          ${{ runner.os }}-brew-

    # Cache SPM dependencies (metadata + downloaded artifacts including binary XCFrameworks)
    # Note: Using static version key due to hashFiles() limitations in this CI environment
    # Manually increment version when project.yml package dependencies change
    # IMPORTANT: Do NOT use broad restore-keys fallback - it can restore stale package versions
    # v6: Added ~/Library/Caches/org.swift.swiftpm to cache binary artifacts
    - name: Cache SPM dependencies
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          ~/Library/Caches/org.swift.swiftpm
        key: ${{ runner.os }}-spm-v9

    - name: Install XcodeGen
      run: |
        brew install xcodegen

    - name: Generate Xcode project
      run: |
        make generate

    - name: Download build artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: scheduled-build-products
        path: ./DerivedData

    - name: Run ${{ matrix.test-name }}
      timeout-minutes: ${{ matrix.timeout }}
      env:
        SCHEME: ${{ matrix.scheme }}
        TEST_TARGET: ${{ matrix.test-target }}
        ARTIFACT_NAME: ${{ matrix.artifact-name }}
        TEST_NAME: ${{ matrix.test-name }}
      run: |
        mkdir -p test-results
        set -o pipefail

        xcodebuild test-without-building \
          -project Pulse.xcodeproj \
          -scheme "$SCHEME" \
          -only-testing:"$TEST_TARGET" \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -derivedDataPath ./DerivedData \
          -resultBundlePath "test-results/${ARTIFACT_NAME}.xcresult" \
          -disableAutomaticPackageResolution \
          -retry-tests-on-failure \
          2>&1 | tee /tmp/test_output.log

        TEST_EXIT_CODE=${PIPESTATUS[0]}

        echo ""
        echo "============================================"
        echo "              TEST SUMMARY"
        echo "============================================"
        grep -E "(Test Suite.*started|Test Suite.*passed|Test Suite.*failed|Executed [0-9]+ test)" /tmp/test_output.log | tail -10 || echo "$TEST_NAME completed"

        exit $TEST_EXIT_CODE

    - name: Extract and display test failures
      if: failure()
      run: |
        echo ""
        echo "============================================"
        echo "          FAILED TESTS SUMMARY"
        echo "============================================"
        echo ""

        # Check if xcresult exists
        if [ ! -d "$RESULT_BUNDLE" ]; then
          echo "::warning::Test result bundle not found at $RESULT_BUNDLE"
          echo "Falling back to log parsing..."
          echo ""
          grep -E "(✘|Test Case.*failed|FAIL|Assertion)" /tmp/test_output.log 2>/dev/null | head -50 || echo "No failures found in log"
          exit 0
        fi

        # Write header to job summary
        echo "## Failed: ${TEST_NAME}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Extract test failures using xcresulttool (requires --legacy flag on newer Xcode)
        python3 << 'PYTHON_SCRIPT'
        import json
        import subprocess
        import sys
        import os

        result_bundle = os.environ.get('RESULT_BUNDLE', 'test-results/test.xcresult')
        summary_file = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')

        # Try new format first, then legacy
        data = None
        for legacy_flag in ["", "--legacy"]:
            try:
                cmd = ["xcrun", "xcresulttool", "get", "object"]
                if legacy_flag:
                    cmd.append(legacy_flag)
                cmd.extend(["--path", result_bundle, "--format", "json"])

                result = subprocess.run(cmd, capture_output=True, text=True)
                if result.returncode == 0 and result.stdout.strip():
                    data = json.loads(result.stdout)
                    break
            except Exception:
                continue

        if data is None:
            print("Could not parse xcresult bundle")
            sys.exit(0)

        # Navigate to test failure summaries
        actions = data.get('actions', {}).get('_values', [])
        if not actions:
            print("No actions found in xcresult")
            sys.exit(0)

        action = actions[0]
        issues = action.get('actionResult', {}).get('issues', {})
        failures = issues.get('testFailureSummaries', {}).get('_values', [])

        if not failures:
            print("No test failures found in xcresult (test may have crashed)")
            sys.exit(0)

        print(f"Found {len(failures)} test failure(s):")
        print("")

        # Also write to GITHUB_STEP_SUMMARY
        with open(summary_file, "a") as summary:
            summary.write("| Test | Failure Message |\n")
            summary.write("|------|----------------|\n")

            for f in failures:
                test_name = f.get('testCaseName', {}).get('_value', 'Unknown Test')
                message = f.get('message', {}).get('_value', 'No message')

                # Clean up message for display
                message_short = message[:150] + "..." if len(message) > 150 else message
                message_escaped = message_short.replace("|", "\\|").replace("\n", " ")

                # Print to console
                print(f"❌ {test_name}")
                print(f"   {message_short}")
                print("")

                # GitHub Actions error annotation
                print(f"::error title={test_name}::{message_short}")

                # Write to summary
                summary.write(f"| `{test_name}` | {message_escaped} |\n")

        print("")
        print("See the uploaded .xcresult artifact for full details.")
        PYTHON_SCRIPT
      env:
        RESULT_BUNDLE: test-results/${{ matrix.artifact-name }}.xcresult
        TEST_NAME: ${{ matrix.test-name }}

    - name: Upload test results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: ${{ matrix.artifact-name }}
        path: test-results/${{ matrix.artifact-name }}.xcresult
        if-no-files-found: warn
        retention-days: 5

    - name: Upload recorded snapshots
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always() && matrix.test-target == 'PulseSnapshotTests'
      with:
        name: scheduled-recorded-snapshots
        path: PulseSnapshotTests/**/__Snapshots__/**/*.png
        if-no-files-found: ignore

  test-results:
    name: Test Results Summary
    runs-on: macos-26
    needs: [tests]
    if: always()

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Download unit test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-unit-test-results
        path: unit-test-results

    - name: Download UI test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-ui-test-results
        path: ui-test-results

    - name: Download snapshot test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-snapshot-test-results
        path: snapshot-test-results

    - name: Check test job results
      id: check-results
      run: |
        # Check the outcome of the tests job
        TEST_RESULT="${{ needs.tests.result }}"
        echo "Tests job result: $TEST_RESULT"

        if [ "$TEST_RESULT" == "success" ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi

    - name: Display Test Results Summary
      run: |
        echo "Scheduled Test Results Summary"
        echo "==============================="
        echo ""

        # Check if artifacts exist and display status
        UNIT_STATUS="Unknown"
        UI_STATUS="Unknown"
        SNAPSHOT_STATUS="Unknown"

        if [ -d "unit-test-results" ]; then
          UNIT_STATUS="Completed"
        else
          UNIT_STATUS="Failed or Missing"
        fi

        if [ -d "ui-test-results" ]; then
          UI_STATUS="Completed"
        else
          UI_STATUS="Failed or Missing"
        fi

        if [ -d "snapshot-test-results" ]; then
          SNAPSHOT_STATUS="Completed"
        else
          SNAPSHOT_STATUS="Failed or Missing"
        fi

        echo "Unit Tests: $UNIT_STATUS"
        echo "UI Tests: $UI_STATUS"
        echo "Snapshot Tests: $SNAPSHOT_STATUS"
        echo ""
        echo "Test artifacts downloaded:"
        ls -la unit-test-results/ 2>/dev/null || echo "  No unit test artifacts found"
        ls -la ui-test-results/ 2>/dev/null || echo "  No UI test artifacts found"
        ls -la snapshot-test-results/ 2>/dev/null || echo "  No snapshot test artifacts found"
        echo ""

        if [ "${{ steps.check-results.outputs.status }}" == "success" ]; then
          echo "All scheduled tests completed successfully!"
        else
          echo "Some tests failed or were cancelled"
        fi
        echo ""
        echo "Daily test run completed at $(date)"

    - name: Fail if tests failed
      if: steps.check-results.outputs.status == 'failure'
      run: |
        echo "::error::Test suite failed or was cancelled"
        exit 1

  auto-fix-tests:
    name: Auto-Fix Failing Tests
    runs-on: macos-26
    needs: [test-results]
    if: always() && needs.test-results.result == 'failure'
    concurrency:
      group: auto-fix-tests
      cancel-in-progress: true
    permissions:
      actions: read
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
      with:
        xcode-version: '26.4'

    - name: Install iOS Simulator Runtime
      run: |
        echo "Installing iOS simulator runtime..."
        # Initialize CoreSimulator service before downloading
        xcrun simctl list runtimes > /dev/null 2>&1 || true
        sleep 5
        xcodebuild -downloadPlatform iOS
        echo "Available iOS simulator runtimes:"
        xcrun simctl list runtimes | grep iOS

    - name: Cache Homebrew packages
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Homebrew
        key: ${{ runner.os }}-brew-v1
        restore-keys: |
          ${{ runner.os }}-brew-

    - name: Cache SPM dependencies
      uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
      with:
        path: |
          Pulse.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
        key: ${{ runner.os }}-spm-v9

    - name: Install dependencies
      run: |
        brew install xcodegen

    - name: Generate Xcode project
      run: |
        make generate

    - name: Download unit test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-unit-test-results
        path: unit-test-results

    - name: Download UI test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-ui-test-results
        path: ui-test-results

    - name: Download snapshot test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      continue-on-error: true
      with:
        name: scheduled-snapshot-test-results
        path: snapshot-test-results

    - name: Extract test failure details
      id: extract-failures
      run: |
        echo "Extracting test failure information..."
        echo "======================================="

        # Check what test result directories exist
        echo "Available test result directories:"
        ls -la unit-test-results/ 2>/dev/null || echo "  unit-test-results: not found"
        ls -la ui-test-results/ 2>/dev/null || echo "  ui-test-results: not found"
        ls -la snapshot-test-results/ 2>/dev/null || echo "  snapshot-test-results: not found"
        echo ""

        # Extract failures from xcresult bundles using xcresulttool
        for result_dir in unit-test-results ui-test-results snapshot-test-results; do
          if [ -d "$result_dir" ]; then
            for xcresult in "$result_dir"/*.xcresult; do
              if [ -d "$xcresult" ]; then
                echo "Processing $xcresult..."

                # Method 1: Try to get test results summary first
                echo "  Attempting test-results extraction..."
                xcrun xcresulttool get test-results summary --path "$xcresult" 2>/dev/null | head -50 || echo "  test-results summary not available"

                # Method 2: Get failures using JSON query
                echo "  Attempting JSON extraction..."
                xcrun xcresulttool get --format json --path "$xcresult" 2>/dev/null | \
                  jq -r '.. | objects | select(.testStatus == "Failure") | "Test: \(.identifier // "unknown")\nName: \(.name // "unknown")\nMessage: \(.failureSummaries // [] | .[0]?.message // "No message")\nFile: \(.failureSummaries // [] | .[0]?.fileName // "Unknown") line \(.failureSummaries // [] | .[0]?.lineNumber // "?")\n---"' 2>/dev/null >> /tmp/failures.txt || true

                # Method 3: Alternative - look for issues in the result bundle
                echo "  Attempting issues extraction..."
                xcrun xcresulttool get --format json --path "$xcresult" 2>/dev/null | \
                  jq -r '.. | objects | select(.issueType? != null) | "Issue: \(.issueType // "unknown")\nMessage: \(.message // "No message")\nFile: \(.documentLocationInCreatingWorkspace?.url // "Unknown")\n---"' 2>/dev/null >> /tmp/failures.txt || true

                echo ""
              fi
            done
          fi
        done

        echo "======================================="
        echo "Extraction complete. Checking results..."
        echo ""

        if [ -f /tmp/failures.txt ] && [ -s /tmp/failures.txt ]; then
          echo "Found failures in /tmp/failures.txt:"
          echo "--------------------------------------"
          cat /tmp/failures.txt | head -100
          echo "--------------------------------------"
        else
          echo "WARNING: No failures extracted from xcresult bundles"
          echo "Creating fallback failure message..."
          echo "Test failures detected but details could not be extracted from xcresult bundles." > /tmp/failures.txt
          echo "Please check the workflow logs and xcresult artifacts for details." >> /tmp/failures.txt
        fi

        # Copy to the file Claude will read
        cp /tmp/failures.txt /tmp/test_failures.txt
        echo ""
        echo "Final content of /tmp/test_failures.txt:"
        echo "--------------------------------------"
        cat /tmp/test_failures.txt
        echo "--------------------------------------"
        echo "failures_found=true" >> $GITHUB_OUTPUT

    - name: Create fix branch
      id: create-branch
      env:
        RUN_ID: ${{ github.run_id }}
      run: |
        BRANCH_NAME="auto-fix/test-failures-${RUN_ID}"
        git checkout -b "$BRANCH_NAME"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

    - name: Run Claude to analyze and fix tests
      uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
      env:
        # Max reasoning effort — Opus 4.6's highest adaptive thinking tier with no token constraints.
        # Matches the convention already used in .github/workflows/claude-code-review.yml.
        CLAUDE_CODE_EFFORT_LEVEL: max
      with:
        claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        model: claude-opus-4-6
        prompt: |
          ultrathink

          You are analyzing failing tests in a scheduled CI run for the Pulse iOS app.

          ## Test Failure Details
          Read the file /tmp/test_failures.txt to see what tests failed.

          ## Your Task
          1. Read /tmp/test_failures.txt to see which tests failed
          2. Analyze the failing tests to understand what's broken
          3. Look at the relevant test files and source code
          4. Fix the issues causing test failures

          ## Guidelines
          - Focus only on fixing the failing tests, don't refactor unrelated code
          - If a test is flaky, consider adding retry logic or fixing the race condition
          - For snapshot test failures, regenerate snapshots if the UI change was intentional
          - For unit test failures, fix either the test or the source code depending on what's correct
          - If you cannot fix a test, document why in a comment

          ## After fixing
          - Stage all changes with git add
          - Do NOT commit - the workflow will handle that
        # Restricted tool access — no arbitrary command execution
        claude_args: '--allowedTools "Read,Edit,Write,Glob,Grep,Bash(git add:*),Bash(git status:*),Bash(git diff:*),Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(find:*),Bash(make generate)"'

    - name: Check for changes
      id: check-changes
      run: |
        echo "======================================="
        echo "Checking for source code changes made by Claude..."
        echo "======================================="
        echo ""

        # Show all changes (for debugging)
        echo "All git status (including artifacts):"
        git status --short | head -50
        echo ""

        # Only check for changes in source code, not test result artifacts
        # Exclude test result directories from the check
        echo "Source code changes only (excluding test artifacts):"
        git status --short -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results'
        echo ""

        if git diff --quiet -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results' && \
           git diff --staged --quiet -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results'; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "RESULT: No source code changes made by Claude"
          echo ""
          echo "This could mean:"
          echo "  - Claude couldn't determine a fix for the failing tests"
          echo "  - The test failure info wasn't detailed enough"
          echo "  - The issue requires manual intervention"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "RESULT: Source code changes detected!"
          echo ""
          echo "Changed files:"
          git diff --name-only -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results'
          echo ""
          echo "Staged files:"
          git diff --staged --name-only -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results'
          echo ""
          echo "Diff preview (first 100 lines):"
          git diff -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results' | head -100
        fi
        echo "======================================="

    - name: Validate fixes (build project)
      id: validate-fixes
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "Validating Claude's fixes by building the project..."
        xcodebuild build \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'platform=iOS Simulator,name=iPhone Air,OS=latest' \
          -quiet \
          CODE_SIGNING_ALLOWED=NO \
          -skipMacroValidation || {
            echo "build_failed=true" >> $GITHUB_OUTPUT
            echo "::warning::Build failed after Claude's fixes - changes may be incomplete"
            exit 0
          }
        echo "build_failed=false" >> $GITHUB_OUTPUT
        echo "Build successful - fixes validated"

    - name: Commit and push changes
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
        GH_REPO: ${{ github.repository }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Configure git to use the token for authentication
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"

        # Only add source code changes, not test result artifacts
        git add -A -- ':!unit-test-results' ':!ui-test-results' ':!snapshot-test-results'
        git commit -m "fix: auto-fix failing tests from scheduled run

        This commit contains automated fixes for test failures detected
        in the scheduled nightly test run.

        Fixes generated by Claude Code CLI."

        git push --force-with-lease origin "$BRANCH_NAME"

    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_SERVER_URL: ${{ github.server_url }}
        GH_REPOSITORY: ${{ github.repository }}
        GH_RUN_ID: ${{ github.run_id }}
        BRANCH_NAME: ${{ steps.create-branch.outputs.branch_name }}
      run: |
        gh pr create \
          --title "fix: Auto-fix test failures from $(date +%Y-%m-%d) scheduled run" \
          --body "## Automated Test Fix PR

        This PR was automatically generated by Claude Code in response to failing tests
        in the scheduled nightly test run.

        ### What happened
        - Scheduled tests ran and detected failures
        - Claude analyzed the test failures and attempted fixes
        - Build validation: ${{ steps.validate-fixes.outputs.build_failed == 'true' && 'FAILED' || 'PASSED' }}
        - This PR contains the proposed fixes

        ### Review checklist
        - [ ] Verify the fixes are correct and don't mask real bugs
        - [ ] Check that no unintended changes were made
        - [ ] Run tests locally to confirm fixes work

        ### Test failure details
        See the [workflow run](${GH_SERVER_URL}/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}) for full details.

        ---
        *This PR was auto-generated by the scheduled-tests workflow.*" \
          --base master \
          --head "$BRANCH_NAME"
