name: DocC

# Builds the DocC bundle so broken doc references / malformed symbol links fail
# CI instead of silently rotting. Build-only — the .doccarchive is uploaded as
# an artifact; publishing to GitHub Pages is intentionally NOT wired up (that
# would need a repo settings change).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  docc:
    name: Build DocC
    runs-on: macos-26
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    # Shared setup (Select Xcode + brew/SPM caches + xcodegen + generate).
    # install-runtime: false — docbuild targets a generic iOS destination and
    # never boots a simulator.
    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "false"

    - name: Resolve Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -onlyUsePackageVersionsFromResolvedFile

    # NOTE: --warnings-as-errors is intentionally NOT passed here. As a global
    # OTHER_DOCC_FLAGS build setting it applies to every docc target in the
    # scheme's dependency graph, including the vendored swift-llama-cpp package,
    # which ships malformed doc comments we can't fix (fetched fresh each build).
    # Enforcing broken-link failures for Pulse's own docs needs per-target
    # scoping (set OTHER_DOCC_FLAGS only on the app target in project.yml) plus a
    # cleanup of Pulse's existing doc warnings — tracked as a follow-up.
    - name: Build DocC documentation
      run: |
        xcodebuild docbuild \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./DerivedData \
          -onlyUsePackageVersionsFromResolvedFile \
          DOCC_EXTRACT_SWIFT_INFO_FOR_OBJC_SYMBOLS=NO \
          CODE_SIGNING_ALLOWED=NO \
          -skipMacroValidation

    - name: Locate and zip doccarchive
      id: docc
      run: |
        ARCHIVE=$(find ./DerivedData -name '*.doccarchive' -type d | head -1)
        if [ -z "$ARCHIVE" ]; then
          # A successful docbuild always emits exactly one archive; zero archives
          # means a scheme/target regression, so fail rather than pass green.
          echo "::error::No .doccarchive produced"
          exit 1
        fi
        echo "Built $ARCHIVE"
        # DocC writes symbol JSON with ':' in the filenames (e.g.
        # method(param:).json), which actions/upload-artifact rejects as an
        # invalid path. Zip first so the artifact is a single valid-named file.
        ditto -c -k --sequesterRsrc --keepParent "$ARCHIVE" pulse-doccarchive.zip
        echo "zip=pulse-doccarchive.zip" >> "$GITHUB_OUTPUT"

    - name: Upload doccarchive
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: steps.docc.outputs.zip != ''
      with:
        name: pulse-doccarchive
        path: ${{ steps.docc.outputs.zip }}
        if-no-files-found: ignore
        retention-days: 7
