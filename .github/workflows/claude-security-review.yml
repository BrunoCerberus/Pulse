name: Claude Security Review

# Threat-model-guided security loop, distinct from the general-purpose style/quality
# review in claude-code-review.yml. Implements Anthropic's "Using LLMs to Secure Source
# Code" playbook with SEPARATE-CONTEXT verification — the doc's strongest recommendation:
#
#   pr-discovery  →  (artifact: security-findings.json)  →  pr-verify  →  PR comments
#
# Discovery emits findings to an artifact and posts NOTHING. Verification runs in a
# fresh job (no shared filesystem or conversation with discovery — it sees only the
# findings JSON + the code) and is prompted to DISPROVE each finding; it posts inline
# comments ONLY for findings it cannot refute. This avoids the failure mode the blog
# calls out: a discovery agent that self-verifies filters out true positives a separate
# step would have confirmed.
#
# ADVISORY by design: verify only leaves comments — it never runs `gh pr review`, sets
# no verdict, and is NOT in the master required-check ruleset. Promote later via the
# ruleset (PUT) once its signal-to-noise is trusted. Scoped by THREAT_MODEL.md +
# SEVERITY_RUBRIC.md.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  schedule:
    # Weekly Monday 06:00 UTC — offset from CodeQL's Sunday 00:00 so the two security
    # scans don't compete for runners or land findings at the same time.
    - cron: "0 6 * * 1"
  # Run the whole-repo sweep on demand (e.g. before a release, or to validate the
  # sweep path without waiting for the weekly cron).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default — each job grants only what it needs.
permissions: {}

jobs:
  # ── Stage 1: discovery (emits findings, posts nothing) ────────────────────────
  pr-discovery:
    # Skip fork PRs (secrets incl. CLAUDE_CODE_OAUTH_TOKEN aren't exposed to fork runs)
    # and drafts. Same-repo PRs — including Dependabot's — still run.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      # claude-code-action exchanges an OIDC token for a GitHub App token (to read the
      # diff via gh). Discovery has NO pull-requests:write — it cannot post.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude security discovery
        id: discovery
        continue-on-error: true
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a security DISCOVERY agent — find candidates, do not judge them
            finally, and do NOT post anything to the PR. A separate verification job
            adjudicates your output.

            1. Read THREAT_MODEL.md and SEVERITY_RUBRIC.md from the checked-out repo.
            2. Get the diff with `gh pr diff` and read the surrounding files. Hunt the
               THREAT_MODEL.md §3 vuln classes reaching the changed code (prompt
               injection via untrusted article text into the on-device LLM, unvalidated
               deeplink/push params, Share-Extension IPC tampering, secret handling,
               incomplete clearAllUserData wiring, entitlement bypass). Hunt same-class
               and same-call-site VARIANTS, not just the first instance.
            3. Write your findings as a JSON array to `security-findings.json` at the
               repo root. Each element:
               {"title","file","line","vulnClass","attackerInput","impact","severity","poc"}
               `poc` is a failing-Swift-Testing-case sketch or "unproven". Write an empty
               array `[]` if you have no candidates. Do not post comments. Do not run
               `gh pr review` or `gh pr comment`.
          claude_args: '--model "claude-sonnet-4-6[1m]" --allowedTools "Read,Grep,Glob,Write,Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Ensure findings file exists
        if: always()
        run: '[ -f security-findings.json ] || echo "[]" > security-findings.json'

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-findings
          path: security-findings.json
          if-no-files-found: warn
          retention-days: 30

  # ── Stage 2: separate-context adversarial verification (posts confirmed only) ─
  pr-verify:
    needs: pr-discovery
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Download findings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: security-findings

      - name: Run Claude adversarial verification
        id: verify
        continue-on-error: true
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are an adversarial security VERIFIER. You are given ONLY a list of
            candidate findings produced by a separate discovery pass — you do NOT have
            its reasoning. Your job is to DISPROVE each candidate, not confirm it.

            1. Read `security-findings.json` from the working directory. If it is `[]`,
               post a summary comment saying discovery found no candidates, and stop.
            2. Read THREAT_MODEL.md and SEVERITY_RUBRIC.md for scope and scoring.
            3. For EACH candidate, read the cited code yourself and try to refute it:
               look for upstream validation, an auth gate, a type/length constraint,
               unreachable code, or an existing fix. Default to REFUTED unless you can
               trace a concrete, reachable, attacker-controlled exploit path and fail to
               find a mitigation.
            4. Score survivors against SEVERITY_RUBRIC.md (default ceiling Medium — most
               flows sit behind Firebase auth + a private CloudKit zone).

            OUTPUT (advisory — comments only):
            - Post an inline comment via `mcp__github_inline_comment__create_inline_comment`
              ONLY for CONFIRMED findings (could not refute), with the five-dimension
              scoring, severity, and the PoC.
            - Post ONE summary comment via `gh pr comment`: confirmed vs refuted counts,
              and one line per refuted candidate with the mitigation that killed it.
            - Do NOT run `gh pr review`. This pass is advisory and never blocks merges.
          claude_args: '--model "claude-sonnet-4-6[1m]" --allowedTools "Read,Grep,Glob,Bash(cat:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Verification summary
        if: always()
        env:
          OUTCOME: ${{ steps.verify.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "## Claude Security Review (discover → verify)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Pull request | [#${PR_NUMBER}](${PR_URL}) |"
            echo "| Verify outcome | ${OUTCOME} |"
            echo ""
            echo "Discovery emitted candidates to an artifact; a separate-context verifier"
            echo "refuted what it could and posted only confirmed findings as inline"
            echo "comments. Advisory — never blocks merges."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Weekly (+ on-demand) full-repository security sweep ───────────────────────
  scheduled-security-sweep:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Claude security sweep
        id: security-sweep
        continue-on-error: true
        uses: anthropics/claude-code-action@686da461dadac38c2bde9089909de4042a75ebf0 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running a periodic, whole-repository security sweep of the Pulse
            iOS app (no PR context). This complements CodeQL/mobsfscan with semantic
            reasoning they can't do (e.g. prompt-injection sinks).

            1. Read THREAT_MODEL.md and SEVERITY_RUBRIC.md for scope and scoring.
            2. Partition the attack surface (auth, networking/secrets, deeplink/push,
               share-extension IPC, on-device LLM prompt builders, storage/CloudKit)
               and review each for the THREAT_MODEL.md §3 vulnerability classes. Mine
               `git log --grep=security` for unfixed variants of past fixes.
            3. Adversarially self-verify every candidate (try to disprove it) and score
               survivors against the rubric.
            4. Write ALL substantiated findings as Markdown to
               `security-sweep-findings.md` at the repo root, using the per-finding
               format from SEVERITY_RUBRIC.md. If there are none, write a file
               containing exactly "No substantiated findings this run."
          claude_args: '--model "claude-sonnet-4-6[1m]" --allowedTools "Read,Grep,Glob,Write,Bash(git log:*)"'

      - name: Publish findings to job summary
        if: always()
        run: |
          if [ -f security-sweep-findings.md ]; then
            {
              echo "## Claude Security Sweep — $(date -u +%Y-%m-%d)"
              echo ""
              cat security-sweep-findings.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=Claude Security Sweep::No findings file was produced (the sweep step may have failed)."
            echo "## Claude Security Sweep — no findings file produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-sweep-findings
          path: security-sweep-findings.md
          if-no-files-found: warn
          retention-days: 90
