name: LGPD Conformance

# Conformance guard rails for the Lei Geral de Proteção de Dados Pessoais
# (LGPD — Lei nº 13.709/2018). Mirrors the structure of the same-named
# workflow in pulse-backend so the iOS and backend repos stay in lockstep
# on what counts as a privacy-relevant change.
#
# Four parallel jobs:
#   - pii-scan              Bans CPF/CNPJ patterns, non-allowlisted emails,
#                           and runs gitleaks with the repo-wide custom rules.
#   - docs-presence         Required docs (README, AGENTS, CLAUDE,
#                           PrivacyInfo.xcprivacy) exist and are non-empty.
#   - operational-controls  Sign-out / account-deletion data wipe is wired,
#                           env-var API-key fallbacks are #if DEBUG-gated,
#                           networking config has no plaintext http://, and
#                           CloudKit container is .private(...).
#   - structural-integrity  PrivacyInfo.xcprivacy is a valid plist with
#                           required keys, every NSPrivacyCollectedDataType
#                           declares a purpose, and *UsageDescription strings
#                           in app + extension Info.plists are non-empty.

on:
  push:
    branches: [master]
  pull_request:
    branches: [develop, master, main]
  schedule:
    # Weekly defense-in-depth — catches drift from upstream / dependency
    # changes that wouldn't otherwise trigger a PR run.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# Cancel stale PR runs on the same ref. Master pushes and the weekly cron
# always run to completion so we don't lose audit signal.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # PII scan: CPF + CNPJ patterns, email allowlist, gitleaks over full
  # git history with the custom rules in .github/lgpd-gdpr-rules.toml.
  # ---------------------------------------------------------------------------
  pii-scan:
    name: PII Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can sweep every commit.
          fetch-depth: 0

      - name: Ensure ripgrep is available
        run: command -v rg >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep)

      - name: CPF / CNPJ pattern ban
        shell: bash
        run: |
          set -euo pipefail
          CPF_RE='\b[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}\b'
          CNPJ_RE='\b[0-9]{2}\.[0-9]{3}\.[0-9]{3}/[0-9]{4}-[0-9]{2}\b'

          # Mirrors the [allowlist] paths in .github/lgpd-gdpr-rules.toml so
          # the regex pass and the gitleaks pass agree on where illustrative
          # examples are allowed.
          if rg --pcre2 \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -g '!build/**' \
              -g '!DerivedData/**' \
              -e "$CPF_RE" -e "$CNPJ_RE" \
              .; then
            echo "::error::CPF or CNPJ pattern found. LGPD: no Brazilian personal identifiers may be stored in this repo."
            exit 1
          fi
          echo "OK: no CPF/CNPJ patterns."

      - name: Email allowlist enforcement
        shell: bash
        run: |
          set -euo pipefail
          EMAIL_RE='\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'

          # All email literals in the repo, excluding the allowlist itself
          # and build/derived-data artefacts that may contain SDK metadata.
          # Comparison is case-insensitive (RFC 5321 allows it).
          found=$(rg --pcre2 -o "$EMAIL_RE" \
            -g '!.github/pii-allowlist.txt' \
            -g '!build/**' \
            -g '!DerivedData/**' \
            -g '!*.xcresult/**' \
            --no-filename . 2>/dev/null \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u || true)

          # Parse the allowlist into two sets: full addresses and @domain
          # wildcards. Strip comments + blank lines, lowercase everything.
          allowed_addrs=$(grep -vE '^[[:space:]]*(#|$|@)' .github/pii-allowlist.txt \
            | tr '[:upper:]' '[:lower:]' \
            | awk '{print $1}' \
            | sort -u)
          allowed_domains=$(grep -E '^[[:space:]]*@' .github/pii-allowlist.txt \
            | sed -E 's/^[[:space:]]*@//' \
            | awk '{print $1}' \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u)

          # Build the disallowed set: anything in `found` whose full address
          # isn't in `allowed_addrs` AND whose @domain isn't in `allowed_domains`.
          bad=""
          while IFS= read -r email; do
            [ -z "$email" ] && continue
            if printf '%s\n' "$allowed_addrs" | grep -qxF "$email"; then continue; fi
            domain="${email#*@}"
            if printf '%s\n' "$allowed_domains" | grep -qxF "$domain"; then continue; fi
            bad+="$email"$'\n'
          done <<< "$found"

          if [ -n "${bad//[[:space:]]/}" ]; then
            echo "::error::Disallowed email addresses found in source:"
            printf '%s' "$bad" | sed 's/^/  /'
            echo "If intentional, add to .github/pii-allowlist.txt with a justifying comment."
            exit 1
          fi
          echo "OK: all emails are on the allowlist."

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks (LGPD/GDPR custom rules)
        run: gitleaks detect --source . --verbose --redact --no-banner --config .github/lgpd-gdpr-rules.toml

  # ---------------------------------------------------------------------------
  # Docs presence: project docs that double as the privacy posture record
  # must exist and be non-empty.
  # ---------------------------------------------------------------------------
  docs-presence:
    name: Docs Presence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure ripgrep is available
        run: command -v rg >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep)

      - name: Required docs exist and are non-empty
        shell: bash
        run: |
          set -euo pipefail
          required=(
            README.md
            AGENTS.md
            CLAUDE.md
            Pulse/PrivacyInfo.xcprivacy
          )
          fail=0
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Missing or empty — required by LGPD conformance workflow."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "OK: all required docs present."

      - name: README mentions privacy / data handling
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -iqE '\b(privacy|lgpd|gdpr|ccpa|personal data|privacy manifest)\b' README.md; then
            echo "::error file=README.md::README must mention privacy / LGPD / GDPR / CCPA / personal data so contributors find the conformance posture from the entry point."
            exit 1
          fi
          echo "OK: README references privacy."

  # ---------------------------------------------------------------------------
  # Operational controls: load-bearing runtime invariants that keep the LGPD
  # posture true. Any of these failing means a code change has broken the
  # contract documented in CLAUDE.md / AGENTS.md.
  # ---------------------------------------------------------------------------
  operational-controls:
    name: Operational Controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure ripgrep is available
        run: command -v rg >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep)

      - name: clearAllUserData() is defined and wired from sign-out + delete-account
        shell: bash
        run: |
          set -euo pipefail
          # SettingsViewModel.clearAllUserData() is the single private orchestrator
          # that wipes SwiftData + L1/L2 + keychain + UserDefaults + ThemeManager
          # + widget data. It's called internally from the sign-out and
          # account-deletion handlers in the same file, so the invariant we
          # check is structural: the function exists AND both handlers reference
          # it within SettingsViewModel.swift.
          svm="Pulse/Settings/ViewModel/SettingsViewModel.swift"
          if [ ! -f "$svm" ]; then
            echo "::error file=$svm::SettingsViewModel.swift missing."
            exit 1
          fi
          if ! rg -q 'func clearAllUserData' "$svm"; then
            echo "::error file=$svm::clearAllUserData() not defined. LGPD Art. 18 (right to erasure) requires a single entry point that wipes all local user data."
            exit 1
          fi
          # Accept both legacy `self?.clearAllUserData()` and the newer
          # `await self.clearAllUserData()` pattern (used after a
          # `guard let self else { return }` inside an async Task — required
          # once cleanup is awaited rather than fire-and-forget).
          calls=$(rg -c 'self\??\.clearAllUserData\(\)' "$svm" || echo 0)
          if [ "$calls" -lt 2 ]; then
            echo "::error file=$svm::clearAllUserData() is called from $calls site(s) in SettingsViewModel; sign-out and account-deletion handlers must both invoke it (see AGENTS.md item 17)."
            exit 1
          fi
          echo "OK: clearAllUserData() defined and invoked from $calls site(s) in SettingsViewModel."

      - name: API-key env-var fallbacks are #if DEBUG-gated
        shell: bash
        run: |
          set -euo pipefail
          # APIKeysProvider.swift may read SUPABASE_URL / SUPABASE_ANON_KEY from
          # the env, but only inside `#if DEBUG`. A release build that reads
          # secrets from the env would defeat the Remote-Config + Keychain
          # resolution chain documented in CLAUDE.md.
          if ! rg -t swift -q '#if DEBUG' Pulse/Configs/Networking/APIKeysProvider.swift; then
            echo "::error file=Pulse/Configs/Networking/APIKeysProvider.swift::Missing #if DEBUG guard. Env-var key fallbacks must be DEBUG-only."
            exit 1
          fi
          if rg -t swift --pcre2 -q 'ProcessInfo\.processInfo\.environment\b' Pulse/Configs/Networking/APIKeysProvider.swift \
              && ! rg -t swift -B5 'ProcessInfo\.processInfo\.environment' Pulse/Configs/Networking/APIKeysProvider.swift | grep -q '#if DEBUG'; then
            echo "::error file=Pulse/Configs/Networking/APIKeysProvider.swift::ProcessInfo.processInfo.environment access exists outside a #if DEBUG block."
            exit 1
          fi
          echo "OK: env-var fallbacks are DEBUG-gated."

      - name: No plaintext http:// in production networking config
        shell: bash
        run: |
          set -euo pipefail
          # Allow loopback (localhost / 127.0.0.1), example.com, and the
          # Apple-reserved XML namespace URLs. Anything else in the
          # networking layer must use https.
          if rg -t swift --pcre2 \
              -g 'Pulse/Configs/Networking/**' \
              'http://(?!localhost|127\.0\.0\.1|[a-z0-9.-]*\.example\.(com|org)|www\.w3\.org|schemas\.|xmlns\.)' \
              .; then
            echo "::error::Plaintext http:// URL in Pulse/Configs/Networking/. Use https or extend the technical allowlist if this is a namespace."
            exit 1
          fi
          echo "OK: networking config uses https only."

      - name: CloudKit container uses .private(...)
        shell: bash
        run: |
          set -euo pipefail
          # SwiftData ModelConfiguration must scope CloudKit to the user's
          # private database, not .public or omitted. .private is the
          # invariant CLAUDE.md documents under the CloudKit section.
          if ! rg -t swift -q 'cloudKitDatabase:[[:space:]]*\.private' Pulse/; then
            echo "::error::ModelConfiguration no longer uses cloudKitDatabase: .private(...). LGPD posture requires the user's private CloudKit DB; .public would expose data across users."
            exit 1
          fi
          echo "OK: CloudKit container scoped to .private."

  # ---------------------------------------------------------------------------
  # Structural integrity: PrivacyInfo.xcprivacy is the load-bearing structural
  # contract for what data the app collects. Validate its shape and
  # cross-reference it against Info.plist consent strings.
  # ---------------------------------------------------------------------------
  structural-integrity:
    name: Structural Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate PrivacyInfo.xcprivacy
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import plistlib, sys
          path = "Pulse/PrivacyInfo.xcprivacy"
          with open(path, "rb") as f:
              try:
                  data = plistlib.load(f)
              except Exception as e:
                  print(f"::error file={path}::Manifest is not valid plist: {e}")
                  sys.exit(1)

          required_top = ["NSPrivacyTracking", "NSPrivacyTrackingDomains",
                          "NSPrivacyCollectedDataTypes", "NSPrivacyAccessedAPITypes"]
          missing = [k for k in required_top if k not in data]
          if missing:
              for k in missing:
                  print(f"::error file={path}::Missing required key for LGPD: {k}")
              sys.exit(1)

          # LGPD Art. 6 (data minimization): every collected type needs a purpose.
          for entry in data.get("NSPrivacyCollectedDataTypes", []):
              dtype = entry.get("NSPrivacyCollectedDataType", "<unknown>")
              if not (entry.get("NSPrivacyCollectedDataTypePurposes") or []):
                  print(f"::error file={path}::Collected data type {dtype} has no declared purpose (LGPD Art. 6 — finalidade)")
                  sys.exit(1)

          # If tracking is enabled, NSPrivacyTrackingDomains must be non-empty.
          if data.get("NSPrivacyTracking") and not data.get("NSPrivacyTrackingDomains"):
              print(f"::error file={path}::NSPrivacyTracking=true but NSPrivacyTrackingDomains is empty")
              sys.exit(1)

          # LGPD Art. 11 — dados pessoais sensíveis require explicit consent.
          sensitive = {"NSPrivacyCollectedDataTypeHealth", "NSPrivacyCollectedDataTypeFitness",
                       "NSPrivacyCollectedDataTypeSensitiveInfo", "NSPrivacyCollectedDataTypePreciseLocation"}
          for entry in data.get("NSPrivacyCollectedDataTypes", []):
              if entry.get("NSPrivacyCollectedDataType") in sensitive:
                  print(f"::warning file={path}::Sensitive category {entry['NSPrivacyCollectedDataType']} declared — verify LGPD Art. 11 explicit-consent path")

          print(f"OK: privacy manifest declares {len(data.get('NSPrivacyCollectedDataTypes', []))} data types, all with purposes.")
          PY

      - name: Info.plist consent strings are non-empty
        shell: bash
        run: |
          set -euo pipefail
          for plist in Pulse/Info.plist PulseShareExtension/Info.plist PulseWidgetExtension/Info.plist; do
            [ -f "$plist" ] || continue
            python3 - "$plist" <<'PY'
          import plistlib, sys
          path = sys.argv[1]
          with open(path, "rb") as f:
              data = plistlib.load(f)
          bad = [k for k, v in data.items()
                 if k.endswith("UsageDescription") and (not isinstance(v, str) or not v.strip())]
          if bad:
              for k in bad:
                  print(f"::error file={path}::{k} is empty — LGPD Art. 8 requires explicit purpose for consent")
              sys.exit(1)
          if "NSUserTrackingUsageDescription" in data:
              print(f"::notice file={path}::NSUserTrackingUsageDescription present — confirm Pulse/PrivacyInfo.xcprivacy NSPrivacyTracking=true")
          print(f"OK: {path} consent strings non-empty.")
          PY
          done
