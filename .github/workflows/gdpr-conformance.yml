name: GDPR + CCPA Conformance

# Combined privacy review covering:
#   - GDPR (EU Regulation 2016/679)
#   - CCPA / CPRA (California Consumer Privacy Act + Privacy Rights Act,
#     Cal. Civ. Code §1798.100 et seq.)
# Mirrors the structure of the same-named workflow in pulse-backend so the
# iOS and backend repos stay in lockstep on what counts as a privacy-relevant
# change. Folded into one workflow because the regimes overlap ~80%.
#
# Four parallel jobs — same shape as lgpd-conformance.yml:
#   - pii-scan              Bans US SSN patterns, non-allowlisted emails,
#                           and runs gitleaks (catches IBAN + secrets).
#   - docs-presence         Required docs exist and are non-empty.
#   - operational-controls  Sign-out / account-deletion data wipe is wired,
#                           env-var fallbacks are #if DEBUG-gated, networking
#                           uses https, CloudKit container is .private(...),
#                           and the engagement-events container is non-CloudKit.
#   - structural-integrity  PrivacyInfo.xcprivacy is valid, every collected
#                           data type declares a purpose, sensitive categories
#                           are flagged for human review, and *UsageDescription
#                           strings are non-empty.

on:
  push:
    branches: [master]
  pull_request:
    branches: [develop, master, main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # PII scan: US SSN regex ban, email allowlist, gitleaks with custom rules
  # (which also catches IBAN + the upstream secret ruleset).
  # ---------------------------------------------------------------------------
  pii-scan:
    name: PII Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Ensure ripgrep is available
        run: command -v rg >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep)

      - name: US SSN pattern ban (CCPA / CPRA)
        id: ssn-ban
        shell: bash
        run: |
          set -euo pipefail
          # XXX-XX-XXXX. Same exclusion set as the LGPD scan so illustrative
          # examples in conformance docs / configs are permitted.
          SSN_RE='\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b'

          if rg --pcre2 \
              -g '!.github/lgpd-gdpr-rules.toml' \
              -g '!.github/pii-allowlist.txt' \
              -g '!.github/workflows/lgpd-conformance.yml' \
              -g '!.github/workflows/gdpr-conformance.yml' \
              -g '!build/**' \
              -g '!DerivedData/**' \
              -e "$SSN_RE" \
              .; then
            echo "::error::US SSN pattern found. CCPA / CPRA: no US Social Security Numbers may be stored in this repo."
            exit 1
          fi
          echo "OK: no US SSN patterns."

      - name: Email allowlist enforcement
        id: email-allowlist
        shell: bash
        run: |
          set -euo pipefail
          EMAIL_RE='\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b'

          found=$(rg --pcre2 -o "$EMAIL_RE" \
            -g '!.github/pii-allowlist.txt' \
            -g '!build/**' \
            -g '!DerivedData/**' \
            -g '!*.xcresult/**' \
            --no-filename . 2>/dev/null \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u || true)

          allowed_addrs=$(grep -vE '^[[:space:]]*(#|$|@)' .github/pii-allowlist.txt \
            | tr '[:upper:]' '[:lower:]' \
            | awk '{print $1}' \
            | sort -u)
          allowed_domains=$(grep -E '^[[:space:]]*@' .github/pii-allowlist.txt \
            | sed -E 's/^[[:space:]]*@//' \
            | awk '{print $1}' \
            | tr '[:upper:]' '[:lower:]' \
            | sort -u)

          bad=""
          while IFS= read -r email; do
            [ -z "$email" ] && continue
            if printf '%s\n' "$allowed_addrs" | grep -qxF "$email"; then continue; fi
            domain="${email#*@}"
            if printf '%s\n' "$allowed_domains" | grep -qxF "$domain"; then continue; fi
            bad+="$email"$'\n'
          done <<< "$found"

          if [ -n "${bad//[[:space:]]/}" ]; then
            echo "::error::Disallowed email addresses found in source:"
            printf '%s' "$bad" | sed 's/^/  /'
            echo "If intentional, add to .github/pii-allowlist.txt with a justifying comment."
            exit 1
          fi
          echo "OK: all emails are on the allowlist."

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks (LGPD/GDPR custom rules)
        id: gitleaks
        run: gitleaks detect --source . --verbose --redact --no-banner --config .github/lgpd-gdpr-rules.toml

      - name: PII scan summary
        if: always()
        env:
          SSN: ${{ steps.ssn-ban.outcome }}
          EMAILS: ${{ steps.email-allowlist.outcome }}
          GITLEAKS: ${{ steps.gitleaks.outcome }}
        run: |
          {
            echo "## PII Scan"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          for row in "US SSN pattern ban:$SSN" \
                     "Email allowlist enforcement:$EMAILS" \
                     "Gitleaks (custom rules):$GITLEAKS"; do
            name="${row%%:*}"
            result="${row##*:}"
            case "$result" in
              success) verdict="Passed" ;;
              skipped) verdict="Skipped" ;;
              *)       verdict="FAILED" ;;
            esac
            echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
          done

  docs-presence:
    name: Docs Presence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Required docs exist and are non-empty
        id: required-docs
        shell: bash
        run: |
          set -euo pipefail
          required=(
            README.md
            AGENTS.md
            CLAUDE.md
            Pulse/PrivacyInfo.xcprivacy
          )
          fail=0
          for f in "${required[@]}"; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Missing or empty — required by GDPR + CCPA conformance workflow."
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "OK: all required docs present."

      - name: README mentions privacy / data handling
        id: readme-privacy
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -iqE '\b(privacy|lgpd|gdpr|ccpa|personal data|privacy manifest)\b' README.md; then
            echo "::error file=README.md::README must mention privacy / GDPR / CCPA / personal data so contributors find the conformance posture from the entry point."
            exit 1
          fi
          echo "OK: README references privacy."

      - name: Docs presence summary
        if: always()
        env:
          REQUIRED_DOCS: ${{ steps.required-docs.outcome }}
          README_PRIVACY: ${{ steps.readme-privacy.outcome }}
        run: |
          {
            echo "## Docs Presence"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          for row in "Required docs present:$REQUIRED_DOCS" \
                     "README references privacy:$README_PRIVACY"; do
            name="${row%%:*}"
            result="${row##*:}"
            case "$result" in
              success) verdict="Passed" ;;
              skipped) verdict="Skipped" ;;
              *)       verdict="FAILED" ;;
            esac
            echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
          done

  operational-controls:
    name: Operational Controls
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Ensure ripgrep is available
        run: command -v rg >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep)

      - name: clearAllUserData() is defined and wired from sign-out + delete-account
        id: clear-user-data
        shell: bash
        run: |
          set -euo pipefail
          # SettingsViewModel.clearAllUserData() is the single private orchestrator
          # that wipes SwiftData + L1/L2 + keychain + UserDefaults + ThemeManager
          # + widget data. Structural check: function exists AND both the
          # sign-out and account-deletion handlers reference it.
          svm="Pulse/Settings/ViewModel/SettingsViewModel.swift"
          if [ ! -f "$svm" ]; then
            echo "::error file=$svm::SettingsViewModel.swift missing."
            exit 1
          fi
          if ! rg -q 'func clearAllUserData' "$svm"; then
            echo "::error file=$svm::clearAllUserData() not defined. GDPR Art. 17 / CCPA §1798.105 (right to erasure) require a single entry point that wipes all local user data."
            exit 1
          fi
          # Accept three call forms — all of which still satisfy the
          # right-to-erasure invariant (cleanup runs from both handlers):
          #   self?.clearAllUserData()      — legacy weak-self pattern
          #   self.clearAllUserData()       — after `guard let self else { … }`
          #   Self.clearAllUserData(...)    — static call with deps as args,
          #                                   used when cleanup must survive
          #                                   `self` being released by the
          #                                   auth-state flip during sign-out
          calls=$(rg -c '[Ss]elf\??\.clearAllUserData\(' "$svm" || echo 0)
          if [ "$calls" -lt 2 ]; then
            echo "::error file=$svm::clearAllUserData() is called from $calls site(s) in SettingsViewModel; sign-out and account-deletion handlers must both invoke it (see AGENTS.md item 17)."
            exit 1
          fi
          echo "OK: clearAllUserData() defined and invoked from $calls site(s) in SettingsViewModel."

      - name: API-key env-var fallbacks are #if DEBUG-gated
        id: debug-gated-keys
        shell: bash
        run: |
          set -euo pipefail
          if ! rg -t swift -q '#if DEBUG' Pulse/Configs/Networking/APIKeysProvider.swift; then
            echo "::error file=Pulse/Configs/Networking/APIKeysProvider.swift::Missing #if DEBUG guard. Env-var key fallbacks must be DEBUG-only."
            exit 1
          fi
          if rg -t swift --pcre2 -q 'ProcessInfo\.processInfo\.environment\b' Pulse/Configs/Networking/APIKeysProvider.swift \
              && ! rg -t swift -B5 'ProcessInfo\.processInfo\.environment' Pulse/Configs/Networking/APIKeysProvider.swift | grep -q '#if DEBUG'; then
            echo "::error file=Pulse/Configs/Networking/APIKeysProvider.swift::ProcessInfo.processInfo.environment access exists outside a #if DEBUG block."
            exit 1
          fi
          echo "OK: env-var fallbacks are DEBUG-gated."

      - name: No plaintext http:// in production networking config
        id: https-only
        shell: bash
        run: |
          set -euo pipefail
          if rg -t swift --pcre2 \
              -g 'Pulse/Configs/Networking/**' \
              'http://(?!localhost|127\.0\.0\.1|[a-z0-9.-]*\.example\.(com|org)|www\.w3\.org|schemas\.|xmlns\.)' \
              .; then
            echo "::error::Plaintext http:// URL in Pulse/Configs/Networking/. Use https or extend the technical allowlist if this is a namespace."
            exit 1
          fi
          echo "OK: networking config uses https only."

      - name: CloudKit container uses .private(...)
        id: cloudkit-private
        shell: bash
        run: |
          set -euo pipefail
          if ! rg -t swift -q 'cloudKitDatabase:[[:space:]]*\.private' Pulse/; then
            echo "::error::ModelConfiguration no longer uses cloudKitDatabase: .private(...). GDPR / CCPA require user data to be scoped to that user; .public would expose it across users."
            exit 1
          fi
          echo "OK: CloudKit container scoped to .private."

      - name: Engagement-events container is NOT CloudKit-synced
        id: engagement-non-cloudkit
        shell: bash
        run: |
          set -euo pipefail
          # PendingEngagementEvent must live in a separate non-CloudKit
          # ModelContainer (per AGENTS.md item 26 + 31). If the file ever
          # picks up a `cloudKitDatabase:` argument, the per-device guarantee
          # for engagement signals is broken.
          if rg -t swift -q 'cloudKitDatabase' Pulse/Personalization/API/LiveEngagementEventsService.swift 2>/dev/null; then
            echo "::error file=Pulse/Personalization/API/LiveEngagementEventsService.swift::Engagement-events ModelContainer must NOT use cloudKitDatabase. Engagement signals are per-device by design (GDPR Art. 5(1)(c) data minimization)."
            exit 1
          fi
          echo "OK: engagement-events container is non-CloudKit."

      - name: Operational controls summary
        if: always()
        env:
          CLEAR_USER_DATA: ${{ steps.clear-user-data.outcome }}
          DEBUG_GATED_KEYS: ${{ steps.debug-gated-keys.outcome }}
          HTTPS_ONLY: ${{ steps.https-only.outcome }}
          CLOUDKIT_PRIVATE: ${{ steps.cloudkit-private.outcome }}
          ENGAGEMENT_LOCAL: ${{ steps.engagement-non-cloudkit.outcome }}
        run: |
          {
            echo "## Operational Controls"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          for row in "clearAllUserData() wired:$CLEAR_USER_DATA" \
                     "API-key fallbacks DEBUG-gated:$DEBUG_GATED_KEYS" \
                     "No plaintext HTTP URLs:$HTTPS_ONLY" \
                     "CloudKit container .private:$CLOUDKIT_PRIVATE" \
                     "Engagement-events non-CloudKit:$ENGAGEMENT_LOCAL"; do
            name="${row%%:*}"
            result="${row##*:}"
            case "$result" in
              success) verdict="Passed" ;;
              skipped) verdict="Skipped" ;;
              *)       verdict="FAILED" ;;
            esac
            echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
          done

  structural-integrity:
    name: Structural Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate PrivacyInfo.xcprivacy
        id: validate-manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import plistlib, sys
          path = "Pulse/PrivacyInfo.xcprivacy"
          with open(path, "rb") as f:
              try:
                  data = plistlib.load(f)
              except Exception as e:
                  print(f"::error file={path}::Manifest is not valid plist: {e}")
                  sys.exit(1)

          required_top = ["NSPrivacyTracking", "NSPrivacyTrackingDomains",
                          "NSPrivacyCollectedDataTypes", "NSPrivacyAccessedAPITypes"]
          missing = [k for k in required_top if k not in data]
          if missing:
              for k in missing:
                  print(f"::error file={path}::Missing required key for GDPR / CCPA: {k}")
              sys.exit(1)

          # GDPR Art. 5(1)(c) / CCPA §1798.100(b): every collected type needs a purpose.
          for entry in data.get("NSPrivacyCollectedDataTypes", []):
              dtype = entry.get("NSPrivacyCollectedDataType", "<unknown>")
              if not (entry.get("NSPrivacyCollectedDataTypePurposes") or []):
                  print(f"::error file={path}::Collected data type {dtype} has no declared purpose (GDPR Art. 5(1)(b)/(c))")
                  sys.exit(1)

          if data.get("NSPrivacyTracking") and not data.get("NSPrivacyTrackingDomains"):
              print(f"::error file={path}::NSPrivacyTracking=true but NSPrivacyTrackingDomains is empty (GDPR Art. 7)")
              sys.exit(1)

          # Sensitive categories under GDPR Art. 9 AND CPRA §1798.121 require
          # an explicit-consent / opt-out path. Flag for human review.
          sensitive = {"NSPrivacyCollectedDataTypeHealth", "NSPrivacyCollectedDataTypeFitness",
                       "NSPrivacyCollectedDataTypeSensitiveInfo", "NSPrivacyCollectedDataTypePreciseLocation"}
          for entry in data.get("NSPrivacyCollectedDataTypes", []):
              if entry.get("NSPrivacyCollectedDataType") in sensitive:
                  print(f"::warning file={path}::Sensitive category {entry['NSPrivacyCollectedDataType']} declared — verify GDPR Art. 9 explicit-consent path AND CPRA §1798.121 right-to-limit affordance")

          print(f"OK: privacy manifest declares {len(data.get('NSPrivacyCollectedDataTypes', []))} data types, all with purposes.")
          PY

      - name: Info.plist consent strings are non-empty
        id: consent-strings
        shell: bash
        run: |
          set -euo pipefail
          for plist in Pulse/Info.plist PulseShareExtension/Info.plist PulseWidgetExtension/Info.plist; do
            [ -f "$plist" ] || continue
            python3 - "$plist" <<'PY'
          import plistlib, sys
          path = sys.argv[1]
          with open(path, "rb") as f:
              data = plistlib.load(f)
          bad = [k for k, v in data.items()
                 if k.endswith("UsageDescription") and (not isinstance(v, str) or not v.strip())]
          if bad:
              for k in bad:
                  print(f"::error file={path}::{k} is empty — GDPR Art. 13 requires informing the user of the purpose")
              sys.exit(1)
          if "NSUserTrackingUsageDescription" in data:
              print(f"::notice file={path}::NSUserTrackingUsageDescription present — confirm Pulse/PrivacyInfo.xcprivacy NSPrivacyTracking=true and consent UI exists")
          print(f"OK: {path} consent strings non-empty.")
          PY
          done

      - name: Structural integrity summary
        if: always()
        env:
          VALIDATE_MANIFEST: ${{ steps.validate-manifest.outcome }}
          CONSENT_STRINGS: ${{ steps.consent-strings.outcome }}
        run: |
          {
            echo "## Structural Integrity"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"
          for row in "PrivacyInfo.xcprivacy valid:$VALIDATE_MANIFEST" \
                     "Info.plist consent strings:$CONSENT_STRINGS"; do
            name="${row%%:*}"
            result="${row##*:}"
            case "$result" in
              success) verdict="Passed" ;;
              skipped) verdict="Skipped" ;;
              *)       verdict="FAILED" ;;
            esac
            echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
          done
