name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Select Xcode 26.5
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode_26.5*.app 2>/dev/null | head -1)
        if [ -z "$XCODE_PATH" ]; then
          echo "::error::Xcode 26.5 not found on runner"
          ls -d /Applications/Xcode_26*.app || true
          exit 1
        fi
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
        xcodebuild -version

    - name: Install iOS Simulator Runtime
      run: |
        echo "Installing iOS simulator runtime..."
        xcrun simctl list runtimes > /dev/null 2>&1 || true
        sleep 5
        xcodebuild -downloadPlatform iOS
        echo "Available iOS simulator runtimes:"
        xcrun simctl list runtimes | grep iOS

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: make generate

    - name: Initialize CodeQL
      uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
      with:
        languages: swift

    - name: Build for CodeQL
      run: |
        xcodebuild build \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'generic/platform=iOS Simulator' \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
