name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Skip Homebrew's auto-update before every `brew install`. Auto-update
# re-evaluates all installed formulae, and any still using the deprecated
# `no_autobump! :requires_manual_review` API emit a warning that GitHub
# Actions promotes to an annotation — flooding each run with dozens of
# identical deprecation warnings. Disabling it removes that phase (and
# speeds installs); the pinned CLI tools are already on the runner image.
env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  analyze:
    name: Analyze
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    # Shared setup (Select Xcode + brew/SPM caches + xcodegen + generate).
    # install-runtime: false — CodeQL builds against a generic simulator
    # destination and never boots a simulator, so it doesn't need the runtime.
    - name: Set up iOS build environment
      uses: ./.github/actions/setup-ios
      with:
        install-runtime: "false"

    - name: Initialize CodeQL
      id: codeql-init
      uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      with:
        languages: swift
        # security-extended adds the broader security query pack on top of the
        # default high-precision suite — more coverage for a low triage cost on
        # an advisory (non-blocking) scan.
        queries: security-extended

    - name: Build for CodeQL
      id: codeql-build
      run: |
        xcodebuild build \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'generic/platform=iOS Simulator' \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Perform CodeQL Analysis
      id: codeql-analyze
      uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

    - name: Analysis summary
      if: always()
      env:
        INIT: ${{ steps.codeql-init.outcome }}
        BUILD: ${{ steps.codeql-build.outcome }}
        ANALYZE: ${{ steps.codeql-analyze.outcome }}
      run: |
        {
          echo "## CodeQL Analysis (Swift)"
          echo ""
          echo "| Stage | Result |"
          echo "|-------|--------|"
        } >> "$GITHUB_STEP_SUMMARY"
        for row in "Initialize CodeQL:$INIT" \
                   "Build for CodeQL:$BUILD" \
                   "Perform CodeQL Analysis:$ANALYZE"; do
          name="${row%%:*}"
          result="${row##*:}"
          case "$result" in
            success) verdict="Passed" ;;
            skipped) verdict="Skipped" ;;
            *)       verdict="FAILED" ;;
          esac
          echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
        done
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Findings (if any) are reported under the repository's **Security → Code scanning** tab." >> "$GITHUB_STEP_SUMMARY"
