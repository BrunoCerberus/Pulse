name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Skip Homebrew's auto-update before every `brew install`. Auto-update
# re-evaluates all installed formulae, and any still using the deprecated
# `no_autobump! :requires_manual_review` API emit a warning that GitHub
# Actions promotes to an annotation — flooding each run with dozens of
# identical deprecation warnings. Disabling it removes that phase (and
# speeds installs); the pinned CLI tools are already on the runner image.
env:
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  analyze:
    name: Analyze
    runs-on: macos-26
    timeout-minutes: 120
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Select Xcode 26.5
      run: |
        XCODE_PATH=$(ls -d /Applications/Xcode_26.5*.app 2>/dev/null | head -1)
        if [ -z "$XCODE_PATH" ]; then
          echo "::error::Xcode 26.5 not found on runner"
          ls -d /Applications/Xcode_26*.app || true
          exit 1
        fi
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
        xcodebuild -version

    - name: Install iOS Simulator Runtime
      run: |
        echo "Installing iOS simulator runtime..."
        xcrun simctl list runtimes > /dev/null 2>&1 || true
        sleep 5
        xcodebuild -downloadPlatform iOS
        echo "Available iOS simulator runtimes:"
        xcrun simctl list runtimes | grep iOS

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      id: generate
      run: make generate

    - name: Initialize CodeQL
      id: codeql-init
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        languages: swift

    - name: Build for CodeQL
      id: codeql-build
      run: |
        xcodebuild build \
          -project Pulse.xcodeproj \
          -scheme PulseDev \
          -destination 'generic/platform=iOS Simulator' \
          -skipMacroValidation \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Perform CodeQL Analysis
      id: codeql-analyze
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0

    - name: Analysis summary
      if: always()
      env:
        GENERATE: ${{ steps.generate.outcome }}
        INIT: ${{ steps.codeql-init.outcome }}
        BUILD: ${{ steps.codeql-build.outcome }}
        ANALYZE: ${{ steps.codeql-analyze.outcome }}
      run: |
        {
          echo "## CodeQL Analysis (Swift)"
          echo ""
          echo "| Stage | Result |"
          echo "|-------|--------|"
        } >> "$GITHUB_STEP_SUMMARY"
        for row in "Generate Xcode project:$GENERATE" \
                   "Initialize CodeQL:$INIT" \
                   "Build for CodeQL:$BUILD" \
                   "Perform CodeQL Analysis:$ANALYZE"; do
          name="${row%%:*}"
          result="${row##*:}"
          case "$result" in
            success) verdict="Passed" ;;
            skipped) verdict="Skipped" ;;
            *)       verdict="FAILED" ;;
          esac
          echo "| $name | $verdict |" >> "$GITHUB_STEP_SUMMARY"
        done
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "Findings (if any) are reported under the repository's **Security → Code scanning** tab." >> "$GITHUB_STEP_SUMMARY"
