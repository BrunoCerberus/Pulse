# Custom gitleaks rules used by the LGPD and GDPR conformance workflows.
# Layered on top of gitleaks' built-in ruleset (extend.useDefault = true)
# so we keep the upstream secret-detection coverage and add three
# regulator-specific PII patterns. Mirrors the same file in pulse-backend
# so the two repos stay in sync on what counts as personal data.

title = "LGPD / GDPR conformance rules"

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# LGPD — Brazilian personal identifiers
# ---------------------------------------------------------------------------

[[rules]]
id          = "br-cpf"
description = "Brazilian CPF (Cadastro de Pessoas Físicas)"
regex       = '''\b[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}\b'''
tags        = ["pii", "lgpd", "brazil"]

[[rules]]
id          = "br-cnpj"
description = "Brazilian CNPJ (Cadastro Nacional da Pessoa Jurídica)"
regex       = '''\b[0-9]{2}\.[0-9]{3}\.[0-9]{3}/[0-9]{4}-[0-9]{2}\b'''
tags        = ["pii", "lgpd", "brazil"]

# ---------------------------------------------------------------------------
# GDPR — European personal identifiers
# ---------------------------------------------------------------------------

[[rules]]
id          = "iban"
description = "IBAN (International Bank Account Number)"
regex       = '''\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){2,7}(?:[A-Z0-9]{1,4})?\b'''
tags        = ["pii", "gdpr", "financial"]

# ---------------------------------------------------------------------------
# CCPA — US personal identifiers
# ---------------------------------------------------------------------------

[[rules]]
id          = "us-ssn"
description = "US Social Security Number"
regex       = '''\b\d{3}-\d{2}-\d{4}\b'''
tags        = ["pii", "ccpa", "us"]

# ---------------------------------------------------------------------------
# Global allowlist
#
# Excludes the rules + allowlist files themselves (which contain the
# patterns by definition) and the workflow files that document them.
# When iOS-side privacy docs are added under docs/, list them here too
# so illustrative pattern examples are permitted.
# ---------------------------------------------------------------------------

[allowlist]
description = "Documentation and config files that intentionally reference the patterns above."
paths = [
  '''\.github/lgpd-gdpr-rules\.toml''',
  '''\.github/pii-allowlist\.txt''',
  '''\.github/workflows/privacy-conformance\.yml''',
]
